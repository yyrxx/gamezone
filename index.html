<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎮 GameZone - عالم الألعاب</title>
<style>
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-card: #1a1a3e;
  --text-primary: #ffffff;
  --text-secondary: #a0a0cc;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --accent3: #fd79a8;
  --accent4: #fdcb6e;
  --accent5: #55efc4;
  --gradient1: linear-gradient(135deg, #6c5ce7, #a29bfe);
  --gradient2: linear-gradient(135deg, #00cec9, #81ecec);
  --gradient3: linear-gradient(135deg, #fd79a8, #fab1a0);
  --gradient4: linear-gradient(135deg, #fdcb6e, #f39c12);
  --gradient5: linear-gradient(135deg, #55efc4, #00b894);
  --shadow: 0 10px 40px rgba(0,0,0,0.4);
  --shadow-hover: 0 20px 60px rgba(108,92,231,0.3);
  --radius: 20px;
  --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f0f0ff;
    --bg-secondary: #e8e8f8;
    --bg-card: #ffffff;
    --text-primary: #1a1a3e;
    --text-secondary: #6666aa;
    --shadow: 0 10px 40px rgba(108,92,231,0.15);
    --shadow-hover: 0 20px 60px rgba(108,92,231,0.25);
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg-animation {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.bg-animation .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  animation: floatOrb 20s infinite ease-in-out;
}

.orb:nth-child(1) { width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation-delay:0s; }
.orb:nth-child(2) { width:300px;height:300px;background:var(--accent2);top:50%;right:-50px;animation-delay:-5s; }
.orb:nth-child(3) { width:350px;height:350px;background:var(--accent3);bottom:-100px;left:30%;animation-delay:-10s; }
.orb:nth-child(4) { width:250px;height:250px;background:var(--accent4);top:30%;left:50%;animation-delay:-15s; }

@keyframes floatOrb {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(100px,-50px) scale(1.1); }
  50% { transform: translate(-50px,100px) scale(0.9); }
  75% { transform: translate(80px,50px) scale(1.05); }
}

/* ===== MAIN CONTAINER ===== */
.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* ===== HERO SECTION ===== */
.hero {
  text-align: center;
  padding: 40px 0 30px;
  animation: fadeInDown 1s ease;
}

.hero-logo {
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  text-shadow: none;
  letter-spacing: -1px;
}

.hero-logo .emoji {
  -webkit-text-fill-color: initial;
  animation: bounce 2s infinite;
  display: inline-block;
}

.hero-subtitle {
  color: var(--text-secondary);
  font-size: clamp(0.9rem, 2.5vw, 1.2rem);
  font-weight: 300;
  letter-spacing: 2px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.stat-item {
  background: var(--bg-card);
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(108,92,231,0.2);
}

.stat-item span {
  color: var(--accent2);
  font-weight: 700;
}

@keyframes fadeInDown {
  from { opacity:0; transform:translateY(-30px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin: 30px 0 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: '';
  width: 4px;
  height: 30px;
  background: var(--gradient1);
  border-radius: 2px;
}

/* ===== GAME CARDS GRID ===== */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  padding-bottom: 40px;
}

.game-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  border: 1px solid rgba(108,92,231,0.1);
  position: relative;
  animation: fadeInUp 0.6s ease backwards;
}

.game-card:nth-child(1) { animation-delay: 0.1s; }
.game-card:nth-child(2) { animation-delay: 0.2s; }
.game-card:nth-child(3) { animation-delay: 0.3s; }
.game-card:nth-child(4) { animation-delay: 0.4s; }
.game-card:nth-child(5) { animation-delay: 0.5s; }
.game-card:nth-child(6) { animation-delay: 0.6s; }
.game-card:nth-child(7) { animation-delay: 0.7s; }
.game-card:nth-child(8) { animation-delay: 0.8s; }

@keyframes fadeInUp {
  from { opacity:0; transform:translateY(40px); }
  to { opacity:1; transform:translateY(0); }
}

.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--shadow-hover);
  border-color: rgba(108,92,231,0.4);
}

.game-card:active {
  transform: translateY(-4px) scale(0.98);
}

.card-image {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  position: relative;
  overflow: hidden;
}

.card-image::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(transparent, var(--bg-card));
}

.card-image .game-icon {
  z-index: 1;
  transition: var(--transition);
  filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
}

.game-card:hover .game-icon {
  transform: scale(1.2) rotate(5deg);
}

.card-body {
  padding: 15px 20px 20px;
}

.card-body h3 {
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 5px;
}

.card-body p {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  line-height: 1.5;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-level {
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 50px;
  background: rgba(108,92,231,0.15);
  color: var(--accent);
  font-weight: 600;
}

.card-score {
  font-size: 0.75rem;
  color: var(--accent4);
  font-weight: 600;
}

/* ===== GAME MODAL ===== */
.game-modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(10,10,26,0.95);
  backdrop-filter: blur(20px);
  padding: 15px;
  animation: fadeIn 0.3s ease;
}

.game-modal.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

.game-container {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 1px solid rgba(108,92,231,0.2);
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(50px) scale(0.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

.game-header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(108,92,231,0.15);
  position: sticky;
  top: 0;
  background: var(--bg-secondary);
  z-index: 10;
  border-radius: var(--radius) var(--radius) 0 0;
}

.game-header h2 {
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.game-info {
  display: flex;
  gap: 15px;
  font-size: 0.85rem;
}

.game-info span {
  color: var(--accent4);
  font-weight: 700;
}

.close-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.close-btn:hover {
  background: rgba(253,121,168,0.3);
  transform: rotate(90deg);
}

.game-body {
  padding: 20px;
  min-height: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== XO GAME ===== */
.xo-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 280px;
  margin: 20px 0;
}

.xo-cell {
  width: 85px;
  height: 85px;
  background: var(--bg-card);
  border-radius: 15px;
  border: 2px solid rgba(108,92,231,0.2);
  font-size: 2.2rem;
  font-weight: 900;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-primary);
}

.xo-cell:hover:not(.taken) {
  border-color: var(--accent);
  background: rgba(108,92,231,0.1);
  transform: scale(1.05);
}

.xo-cell.x { color: var(--accent); }
.xo-cell.o { color: var(--accent3); }
.xo-cell.win { 
  animation: winPulse 0.5s ease;
  border-color: var(--accent4);
  background: rgba(253,203,110,0.2);
}

@keyframes winPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.game-status {
  font-size: 1.1rem;
  margin: 15px 0;
  font-weight: 600;
  min-height: 30px;
  text-align: center;
}

.play-btn {
  padding: 12px 30px;
  border: none;
  border-radius: 50px;
  background: var(--gradient1);
  color: white;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 10px;
}

.play-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(108,92,231,0.4);
}

.play-btn:active {
  transform: scale(0.95);
}

/* ===== MEMORY GAME ===== */
.memory-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  width: 300px;
  margin: 20px 0;
}

.memory-card {
  width: 68px;
  height: 68px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 2px solid rgba(108,92,231,0.2);
  font-size: 1.8rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.memory-card .card-front {
  display: none;
}

.memory-card .card-back {
  font-size: 1.5rem;
  color: var(--accent);
}

.memory-card.flipped {
  border-color: var(--accent2);
  background: rgba(0,206,201,0.1);
}

.memory-card.flipped .card-front { display: block; }
.memory-card.flipped .card-back { display: none; }

.memory-card.matched {
  border-color: var(--accent5);
  background: rgba(85,239,196,0.15);
  animation: matchPop 0.4s ease;
}

@keyframes matchPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15) rotate(5deg); }
  100% { transform: scale(1); }
}

/* ===== CLICK SPEED GAME ===== */
.click-area {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: var(--gradient1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  margin: 20px 0;
  position: relative;
  user-select: none;
}

.click-area:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(108,92,231,0.4);
}

.click-area:active {
  transform: scale(0.95);
}

.click-area .click-text {
  color: white;
  font-size: 1.3rem;
  font-weight: 700;
  text-align: center;
  pointer-events: none;
}

.click-area .click-count {
  font-size: 3rem;
  display: block;
  margin-top: 5px;
}

.click-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: ripple 0.6s ease-out;
  pointer-events: none;
}

@keyframes ripple {
  from { width:0;height:0;opacity:1; }
  to { width:200px;height:200px;opacity:0;margin:-100px; }
}

/* ===== WORD GUESS GAME ===== */
.word-display {
  font-size: 2rem;
  letter-spacing: 10px;
  margin: 20px 0;
  font-weight: 700;
  color: var(--accent2);
  direction: ltr;
}

.word-hint {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 15px;
  text-align: center;
}

.letter-keyboard {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  max-width: 350px;
  margin: 10px 0;
}

.letter-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 1px solid rgba(108,92,231,0.2);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  text-transform: uppercase;
}

.letter-btn:hover:not(:disabled) {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.1);
}

.letter-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.letter-btn.correct {
  background: var(--accent5);
  border-color: var(--accent5);
  color: #000;
}

.letter-btn.wrong {
  background: var(--accent3);
  border-color: var(--accent3);
}

.hangman-lives {
  font-size: 1.5rem;
  margin: 10px 0;
}

/* ===== MAZE GAME ===== */
.maze-board {
  display: grid;
  gap: 1px;
  margin: 15px 0;
  background: rgba(108,92,231,0.1);
  padding: 8px;
  border-radius: 15px;
}

.maze-cell {
  width: 30px;
  height: 30px;
  border-radius: 5px;
  transition: background 0.2s;
}

.maze-cell.wall { background: var(--bg-card); }
.maze-cell.path { background: rgba(108,92,231,0.05); }
.maze-cell.player { 
  background: var(--accent);
  border-radius: 50%;
  animation: playerPulse 1s infinite;
  box-shadow: 0 0 10px var(--accent);
}
.maze-cell.goal {
  background: var(--accent4);
  border-radius: 50%;
  animation: goalPulse 1.5s infinite;
  box-shadow: 0 0 10px var(--accent4);
}
.maze-cell.visited { background: rgba(108,92,231,0.15); }

@keyframes playerPulse {
  0%,100% { transform: scale(0.8); }
  50% { transform: scale(1); }
}

@keyframes goalPulse {
  0%,100% { transform: scale(0.7); opacity:0.7; }
  50% { transform: scale(1); opacity:1; }
}

.maze-controls {
  display: grid;
  grid-template-columns: repeat(3, 50px);
  grid-template-rows: repeat(2, 50px);
  gap: 5px;
  margin-top: 10px;
}

.maze-btn {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  border: none;
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.maze-btn:hover { background: var(--accent); }
.maze-btn:active { transform: scale(0.9); }

/* ===== FOOTBALL GAME ===== */
.football-field {
  width: 100%;
  max-width: 350px;
  height: 300px;
  background: linear-gradient(180deg, #2d5a27, #3a7a32);
  border-radius: 15px;
  position: relative;
  margin: 15px 0;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.2);
}

.goal-post {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 50px;
  border: 3px solid white;
  border-top: none;
  border-radius: 0 0 5px 5px;
  display: flex;
}

.goal-zone {
  flex: 1;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
}

.goal-zone:hover { background: rgba(255,255,255,0.1); }

.goalkeeper {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  transition: left 0.5s ease;
  z-index: 5;
}

.football {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 10;
  cursor: pointer;
}

.football.kicked {
  bottom: auto !important;
  top: 30px !important;
  transform: translateX(-50%) scale(0.7) !important;
}

/* ===== KNIFE THROW GAME ===== */
.knife-target {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, #8B4513 0%, #654321 40%, #553311 100%);
  position: relative;
  margin: 20px auto;
  border: 3px solid #444;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
}

.knife-target .ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
}

.knife-target .ring:nth-child(1) { width:160px;height:160px;top:20px;left:20px; }
.knife-target .ring:nth-child(2) { width:100px;height:100px;top:50px;left:50px; }
.knife-target .ring:nth-child(3) { width:50px;height:50px;top:75px;left:75px; }
.knife-target .center { 
  position:absolute; width:20px; height:20px; 
  top:90px; left:90px; background:var(--accent3); 
  border-radius:50%; 
  animation: centerPulse 1s infinite;
}

@keyframes centerPulse {
  0%,100% { box-shadow: 0 0 10px var(--accent3); }
  50% { box-shadow: 0 0 25px var(--accent3); }
}

.knife-stuck {
  position: absolute;
  font-size: 1.5rem;
  transition: all 0.3s ease;
  z-index: 5;
}

.throw-btn {
  padding: 15px 40px;
  border: none;
  border-radius: 50px;
  background: var(--gradient3);
  color: white;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 15px;
}

.throw-btn:hover { transform: scale(1.05); }

/* ===== PUZZLE GAME ===== */
.puzzle-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  width: 280px;
  margin: 15px 0;
}

.puzzle-tile {
  width: 65px;
  height: 65px;
  background: var(--gradient1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: var(--transition);
  user-select: none;
}

.puzzle-tile:hover:not(.empty) {
  transform: scale(0.95);
  opacity: 0.9;
}

.puzzle-tile.empty {
  background: transparent;
  cursor: default;
}

/* ===== SCORE MODAL ===== */
.score-modal {
  text-align: center;
  padding: 30px;
}

.score-modal .big-emoji {
  font-size: 4rem;
  margin-bottom: 15px;
  animation: bounce 1s infinite;
}

.score-modal h2 {
  font-size: 1.5rem;
  margin-bottom: 10px;
}

.score-modal .score-value {
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent4), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 10px 0;
}

.score-modal .best-score {
  color: var(--accent2);
  font-size: 0.9rem;
  margin-bottom: 20px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .games-grid {
    grid-template-columns: 1fr;
  }
  .game-card {
    display: flex;
    flex-direction: row;
    align-items: center;
  }
  .card-image {

    height: 100px;
    flex-shrink: 0;

    padding: 15px;

  .xo-board { width: 240px; }
  .xo-cell { width: 72px; height: 72px; font-size: 1.8rem; }
  .memory-board { width: 260px; }
  .memory-card { width: 58px; height: 58px; }
  .puzzle-board { width: 240px; }
  .puzzle-tile { width: 55px; height: 55px; }
  .click-area { width: 200px; height: 200px; }

@media (min-width: 601px) and (max-width: 900px) {
  .games-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ===== PARTICLE EFFECTS ===== */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  animation: particleFly 1s ease-out forwards;
}

@keyframes particleFly {
  0% { opacity:1; transform:translate(0,0) scale(1); }
  100% { opacity:0; transform:translate(var(--tx), var(--ty)) scale(0); }
}

/* ===== LOADING ===== */
.loading-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg-primary);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 0.5s;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader {
  width: 60px;
  height: 60px;
  border: 4px solid rgba(108,92,231,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  color: var(--text-secondary);
  font-size: 0.9rem;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { opacity:0.5; }
  50% { opacity:1; }
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div class="loading-text">جاري تحميل الألعاب...</div>
</div>

<!-- ANIMATED BACKGROUND -->
<div class="bg-animation">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- MAIN CONTAINER -->
<div class="container">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-logo">
      <span class="emoji">🎮</span> GameZone
    </div>
    <p class="hero-subtitle">عالم الألعاب بين يديك</p>
    <div class="stats-bar">
      <div class="stat-item">🎮 الألعاب: <span>8</span></div>
      <div class="stat-item">⭐ أفضل نتيجة: <span id="totalBest">0</span></div>
      <div class="stat-item">🏆 المراحل: <span id="totalLevels">0</span></div>
    </div>
  </div>

  <!-- GAMES GRID -->
  <div class="section-title">🕹️ اختر لعبتك</div>
  <div class="games-grid" id="gamesGrid">
    <!-- Cards generated by JS -->
  </div>
</div>

<!-- GAME MODAL -->
<div class="game-modal" id="gameModal">
  <div class="game-container">
    <div class="game-header">
      <h2 id="gameTitle"></h2>
      <div class="game-info">
        <div>🎯 المرحلة: <span id="gameLevel">1</span></div>
        <div>⭐ النقاط: <span id="gameScore">0</span></div>
        <div>🏆 الأفضل: <span id="gameBest">0</span></div>
      </div>
      <button class="close-btn" onclick="closeGame()">✕</button>
    </div>
    <div class="game-body" id="gameBody">
    </div>
  </div>
</div>

<script>
// ===== SOUND ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(freq, duration, type='sine', vol=0.15) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playClick() { playSound(800, 0.1, 'sine', 0.1); }
function playWin() { 
  playSound(523, 0.15, 'sine', 0.12);
  setTimeout(() => playSound(659, 0.15, 'sine', 0.12), 100);
  setTimeout(() => playSound(784, 0.3, 'sine', 0.12), 200);
}
function playLose() { playSound(200, 0.4, 'sawtooth', 0.08); }
function playMatch() { playSound(600, 0.1, 'sine', 0.1); setTimeout(() => playSound(900, 0.15, 'sine', 0.1), 80); }
function playFlip() { playSound(400, 0.08, 'sine', 0.08); }

// ===== PARTICLE EFFECT =====
function spawnParticles(x, y, count=8, colors=['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#55efc4']) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.width = p.style.height = Math.random() * 10 + 5 + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = '50%';
    p.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
    p.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// ===== SAVE/LOAD =====
function saveScore(game, score) {
  const key = 'gamezone_' + game;
  const prev = parseInt(localStorage.getItem(key)) || 0;
  if (score > prev) {
    localStorage.setItem(key, score);
    return true;
  }
  return false;
}

function getScore(game) {
  return parseInt(localStorage.getItem('gamezone_' + game)) || 0;
}

// ===== GAME DATA =====
const games = [
  { id:'xo', name:'إكس أو', icon:'❌⭕', desc:'تحدَّ الذكاء الاصطناعي في لعبة XO الكلاسيكية', gradient:'var(--gradient1)', levels:5 },
  { id:'memory', name:'اختبار الذاكرة', icon:'🧠', desc:'اكتشف الأزواج المتطابقة واختبر ذاكرتك', gradient:'var(--gradient2)', levels:5 },
  { id:'clickspeed', name:'سرعة النقر', icon:'⚡', desc:'اضغط بأسرع ما يمكن خلال 10 ثوانٍ', gradient:'var(--gradient3)', levels:5 },
  { id:'wordguess', name:'تخمين الكلمات', icon:'🔤', desc:'خمن الكلمة السرية حرفاً بحرف', gradient:'var(--gradient4)', levels:5 },
  { id:'maze', name:'المتاهة', icon:'🏰', desc:'اعثر على الطريق عبر المتاهة المعقدة', gradient:'var(--gradient5)', levels:5 },
  { id:'football', name:'كرة القدم', icon:'⚽', desc:'سدد أهدافاً وتجنب الحارس', gradient:'var(--gradient1)', levels:5 },
  { id:'knife', name:'رمي السكاكين', icon:'🔪', desc:'ارمِ السكاكين على الهدف دون أن تصيب أخرى', gradient:'var(--gradient3)', levels:5 },
  { id:'puzzle', name:'أحجية الأرقام', icon:'🧩', desc:'رتب الأرقام بالترتيب الصحيح', gradient:'var(--gradient2)', levels:5 }
];

let currentGame = null;
let currentLevel = 1;
let score = 0;

// ===== RENDER GAME CARDS =====
function renderCards() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';
  games.forEach(g => {
    const best = getScore(g.id);
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => openGame(g.id);
    card.innerHTML = `
      <div class="card-image" style="background:${g.gradient}">
        <span class="game-icon">${g.icon}</span>
      </div>
      <div class="card-body">
        <h3>${g.name}</h3>
        <p>${g.desc}</p>
        <div class="card-footer">
          <span class="card-level">🎯 ${g.levels} مراحل</span>
          <span class="card-score">🏆 ${best}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ===== OPEN/CLOSE GAME =====
function openGame(id) {
  playClick();
  currentGame = id;
  currentLevel = 1;
  score = 0;
  const game = games.find(g => g.id === id);
  document.getElementById('gameTitle').innerHTML = game.icon + ' ' + game.name;
  document.getElementById('gameLevel').textContent = 1;
  document.getElementById('gameScore').textContent = 0;
  document.getElementById('gameBest').textContent = getScore(id);
  document.getElementById('gameModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  initGame(id);
}

function closeGame() {
  playClick();
  document.getElementById('gameModal').classList.remove('active');
  document.body.style.overflow = '';
  currentGame = null;
  if (window._gameInterval) clearInterval(window._gameInterval);
  if (window._gameTimeout) clearTimeout(window._gameTimeout);
  renderCards();
}

function updateScore(newScore) {
  score = newScore;
  document.getElementById('gameScore').textContent = score;
  const isNew = saveScore(currentGame, score);
  document.getElementById('gameBest').textContent = getScore(currentGame);
  if (isNew) {
    document.getElementById('gameBest').style.color = '#fdcb6e';
    setTimeout(() => document.getElementById('gameBest').style.color = '', 1500);
  }
}

function nextLevel() {
  currentLevel++;
  document.getElementById('gameLevel').textContent = currentLevel;
  initGame(currentGame);
}

function showWinMessage(msg, cb) {
  playWin();
  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="score-modal">
      <div class="big-emoji">🎉</div>
      <h2>${msg}</h2>
      <div class="score-value">${score} نقطة</div>
      <div class="best-score">🏆 أفضل نتيجة: ${getScore(currentGame)}</div>
      <button class="play-btn" onclick="nextLevel()">المرحلة التالية ➜</button>
    </div>
  `;
  if (cb) cb();
}

function showLoseMessage(msg) {
  playLose();
  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="score-modal">
      <div class="big-emoji">😢</div>
      <h2>${msg}</h2>
      <div class="score-value">${score} نقطة</div>
      <div class="best-score">🏆 أفضل نتيجة: ${getScore(currentGame)}</div>
      <button class="play-btn" onclick="initGame(currentGame)">حاول مرة أخرى 🔄</button>
    </div>
  `;
}

// ===== INIT GAME =====
function initGame(id) {
  switch(id) {
    case 'xo': initXO(); break;
    case 'memory': initMemory(); break;
    case 'clickspeed': initClickSpeed(); break;
    case 'wordguess': initWordGuess(); break;
    case 'maze': initMaze(); break;
    case 'football': initFootball(); break;
    case 'knife': initKnife(); break;
    case 'puzzle': initPuzzle(); break;
  }
}

// ============================
// ===== 1. XO GAME ===========
// ============================
let xoBoard, xoTurn, xoGameOver, xoAI;

function initXO() {
  xoBoard = ['','','','','','','','',''];
  xoTurn = 'X';
  xoGameOver = false;
  xoAI = currentLevel <= 2 ? 'easy' : currentLevel <= 4 ? 'medium' : 'hard';
  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="xoStatus">دورك! أنت ❌</div>
    <div class="xo-board" id="xoBoard"></div>
    <div style="color:var(--text-secondary);font-size:0.8rem;margin-top:5px">AI: ${xoAI === 'easy' ? 'سهل' : xoAI === 'medium' ? 'متوسط' : 'صعب'}</div>
  `;
  const board = document.getElementById('xoBoard');
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'xo-cell';
    cell.dataset.index = i;
    cell.onclick = () => xoMove(i);
    board.appendChild(cell);
  }
}

function xoMove(i) {
  if (xoBoard[i] || xoGameOver || xoTurn !== 'X') return;
  playClick();
  xoBoard[i] = 'X';
  updateXOCell(i, 'X');
  if (checkXOWin('X')) { xoGameOver = true; updateScore(10 * currentLevel); showWinMessage('فزت! 🎉'); return; }
  if (xoBoard.every(c => c)) { xoGameOver = true; showLoseMessage('تعادل! 🤝'); return; }
  xoTurn = 'O';
  document.getElementById('xoStatus').textContent = 'دور الذكاء الاصطناعي...';
  setTimeout(xoAI_Move, 500);
}

function xoAI_Move() {
  let move;
  if (xoAI === 'easy') {
    const avail = xoBoard.map((v,i) => v === '' ? i : -1).filter(i => i >= 0);
    move = avail[Math.floor(Math.random() * avail.length)];
  } else if (xoAI === 'medium') {
    move = xoFindBestMove();
    if (Math.random() > 0.6) {
      const avail = xoBoard.map((v,i) => v === '' ? i : -1).filter(i => i >= 0);
      move = avail[Math.floor(Math.random() * avail.length)];
    }
  } else {
    move = xoFindBestMove();
  }
  xoBoard[move] = 'O';
  updateXOCell(move, 'O');
  if (checkXOWin('O')) { xoGameOver = true; showLoseMessage('الذكاء الاصطناعي فاز! 🤖'); return; }
  if (xoBoard.every(c => c)) { xoGameOver = true; showLoseMessage('تعادل! 🤝'); return; }
  xoTurn = 'X';
  document.getElementById('xoStatus').textContent = 'دورك! أنت ❌';
}

function xoFindBestMove() {
  // Try to win
  for (let i = 0; i < 9; i++) {
    if (xoBoard[i] === '') {
      xoBoard[i] = 'O';
      if (checkXOWin('O')) { xoBoard[i] = ''; return i; }
      xoBoard[i] = '';
    }
  }
  // Try to block
  for (let i = 0; i < 9; i++) {
    if (xoBoard[i] === '') {
      xoBoard[i] = 'X';
      if (checkXOWin('X')) { xoBoard[i] = ''; return i; }
      xoBoard[i] = '';
    }
  }
  // Center
  if (xoBoard[4] === '') return 4;
  // Corners
  const corners = [0,2,6,8].filter(i => xoBoard[i] === '');
  if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
  // Any
  const avail = xoBoard.map((v,i) => v === '' ? i : -1).filter(i => i >= 0);
  return avail[Math.floor(Math.random() * avail.length)];
}

function updateXOCell(i, mark) {
  const cells = document.querySelectorAll('.xo-cell');
  cells[i].textContent = mark === 'X' ? '❌' : '⭕';
  cells[i].classList.add('taken', mark.toLowerCase());
}

function checkXOWin(mark) {
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for (const [a,b,c] of wins) {
    if (xoBoard[a] === mark && xoBoard[b] === mark && xoBoard[c] === mark) {
      const cells = document.querySelectorAll('.xo-cell');
      cells[a].classList.add('win');
      cells[b].classList.add('win');
      cells[c].classList.add('win');
      return true;
    }
  }
  return false;
}

// ============================
// ===== 2. MEMORY GAME ========
// ============================
let memoryCards, memoryFlipped, memoryMatched, memoryLocked;

function initMemory() {
  const emojis = ['🍎','🍊','🍋','🍇','🍓','🫐','🍑','🥝','🍌','🍒','🥭','🍍'];
  const pairs = Math.min(2 + currentLevel, 8);
  const cols = pairs <= 4 ? 4 : 4;
  const total = pairs * 2;
  const selected = emojis.slice(0, pairs);
  let deck = [...selected, ...selected];
  deck.sort(() => Math.random() - 0.5);

  memoryFlipped = [];
  memoryMatched = 0;
  memoryLocked = false;

  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="memoryStatus">اقلب البطاقات للعثور على الأزواج!</div>
    <div class="memory-board" id="memoryBoard" style="grid-template-columns:repeat(${cols},1fr)"></div>
    <div style="color:var(--text-secondary);font-size:0.8rem;margin-top:5px">الأزواج المتبقية: <span id="memoryPairs">${pairs}</span></div>
  `;
  const board = document.getElementById('memoryBoard');
  board.style.width = (cols * 78) + 'px';
  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'memory-card';
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.innerHTML = `<span class="card-front">${emoji}</span><span class="card-back">❓</span>`;
    card.onclick = () => flipMemoryCard(card);
    board.appendChild(card);
  });
}

function flipMemoryCard(card) {
  if (memoryLocked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  playFlip();
  card.classList.add('flipped');
  memoryFlipped.push(card);

  if (memoryFlipped.length === 2) {
    memoryLocked = true;
    const [a, b] = memoryFlipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      playMatch();
      a.classList.add('matched');
      b.classList.add('matched');
      memoryMatched++;
      updateScore(5 * currentLevel);
      const pairs = parseInt(document.getElementById('memoryPairs').textContent);
      document.getElementById('memoryPairs').textContent = pairs - 1;
      memoryFlipped = [];
      memoryLocked = false;
      if (memoryMatched === pairs) {
        setTimeout(() => { updateScore(10 * currentLevel); showWinMessage('أحسنت! ذاكرتك قوية! 🧠'); }, 500);
      }
    } else {
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        memoryFlipped = [];
        memoryLocked = false;
      }, 800);
    }
  }
}

// ============================
// ===== 3. CLICK SPEED =======
// ============================
let clickCount, clickTimeLeft, clickActive;

function initClickSpeed() {
  clickCount = 0;
  clickTimeLeft = 10;
  clickActive = false;
  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="clickStatus">اضغط على الدائرة بأسرع ما يمكن!</div>
    <div class="click-area" id="clickArea">
      <div class="click-text">اضغط!<br><span class="click-count" id="clickCount">0</span></div>
    </div>
    <div class="game-status" id="clickTimer">⏱️ 10 ثوانٍ</div>
  `;
  document.getElementById('clickArea').onclick = handleGameClick;
}

function handleGameClick(e) {
  if (!clickActive && clickTimeLeft === 10) {
    clickActive = true;
    window._gameInterval = setInterval(() => {
      clickTimeLeft--;
      document.getElementById('clickTimer').textContent = `⏱️ ${clickTimeLeft} ثوانٍ`;
      if (clickTimeLeft <= 0) {
        clearInterval(window._gameInterval);
        clickActive = false;
        const cps = (clickCount / 10).toFixed(1);
        const points = Math.floor(clickCount * currentLevel / 2);
        updateScore(points);
        showWinMessage(`سرعتك: ${cps} نقرة/ثانية ⚡`);
      }
    }, 1000);
  }
  if (!clickActive) return;
  clickCount++;
  document.getElementById('clickCount').textContent = clickCount;
  playClick();
  // Ripple
  const area = document.getElementById('clickArea');
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple';
  const rect = area.getBoundingClientRect();
  ripple.style.left = (e.clientX - rect.left) + 'px';
  ripple.style.top = (e.clientY - rect.top) + 'px';
  area.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
  // Particles
  spawnParticles(e.clientX, e.clientY, 3);
}

// ============================
// ===== 4. WORD GUESS ========
// ============================
let wordTarget, wordGuessed, wordLives, wordDisplay;

const words = [
  ['CAT','DOG','SUN','RUN','BIG'],
  ['FISH','BIRD','STAR','MOON','TREE'],
  ['APPLE','HOUSE','WATER','MUSIC','DANCE'],
  ['PLANET','GARDEN','ROCKET','BRIDGE','CASTLE'],
  ['DIAMOND','CHOCOLATE','ADVENTURE','ELEPHANT','HURRICANE']
];

function initWordGuess() {
  const wordList = words[currentLevel - 1] || words[4];
  wordTarget = wordList[Math.floor(Math.random() * wordList.length)];
  wordGuessed = new Set();
  wordLives = 6 + currentLevel;
  wordDisplay = wordTarget.split('').map(c => wordGuessed.has(c) ? c : '_');

  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="wordStatus">خمن الكلمة!</div>
    <div class="word-display" id="wordDisplay">${wordDisplay.join(' ')}</div>
    <div class="word-hint" id="wordHint">الكلمة ${wordTarget.length} أحرف</div>
    <div class="hangman-lives" id="wordLives">❤️'.repeat(wordLives)</div>
    <div class="letter-keyboard" id="wordKeyboard"></div>
  `;
  document.getElementById('wordLives').textContent = '❤️'.repeat(wordLives);
  const keyboard = document.getElementById('wordKeyboard');
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter;
    btn.onclick = () => guessLetter(letter, btn);
    keyboard.appendChild(btn);
  });
}

function guessLetter(letter, btn) {
  btn.disabled = true;
  playClick();
  if (wordTarget.includes(letter)) {
    btn.classList.add('correct');
    wordGuessed.add(letter);
    wordDisplay = wordTarget.split('').map(c => wordGuessed.has(c) ? c : '_');
    document.getElementById('wordDisplay').textContent = wordDisplay.join(' ');
    playMatch();
    if (!wordDisplay.includes('_')) {
      const points = (10 + wordLives * 2) * currentLevel;
      updateScore(points);
      showWinMessage('أحسنت! خمنت الكلمة! 🎉');
    }
  } else {
    btn.classList.add('wrong');
    wordLives--;
    document.getElementById('wordLives').textContent = '❤️'.repeat(Math.max(0, wordLives)) + '🖤'.repeat(6 - Math.max(0, wordLives));
    if (wordLives <= 0) {
      document.getElementById('wordStatus').textContent = `الكلمة كانت: ${wordTarget}`;
      showLoseMessage('انتهت المحاولات!');
    }
  }
}

// ============================
// ===== 5. MAZE GAME =========
// ============================
let mazeGrid, mazePlayer, mazeGoal, mazeSize;

function initMaze() {
  mazeSize = 5 + currentLevel * 2;
  mazeGrid = generateMaze(mazeSize);
  mazePlayer = {x: 0, y: 0};
  mazeGoal = {x: mazeSize - 1, y: mazeSize - 1};

  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status">🏰 أوصل اللاعب إلى الهدف 🌟</div>
    <div class="maze-board" id="mazeBoard" style="grid-template-columns:repeat(${mazeSize},30px)"></div>
    <div class="maze-controls">
      <div></div>
      <button class="maze-btn" onclick="moveMaze(0,-1)">⬆️</button>
      <div></div>
      <button class="maze-btn" onclick="moveMaze(-1,0)">➡️</button>
      <button class="maze-btn" onclick="moveMaze(0,1)">⬇️</button>
      <button class="maze-btn" onclick="moveMaze(1,0)">⬅️</button>
    </div>
    <div style="color:var(--text-secondary);font-size:0.8rem;margin-top:8px">أو استخدم أسهم لوحة المفاتيح</div>
  `;
  renderMaze();
  document.onkeydown = (e) => {
    if (currentGame !== 'maze') return;
    switch(e.key) {
      case 'ArrowUp': moveMaze(0,-1); break;
      case 'ArrowDown': moveMaze(0,1); break;
      case 'ArrowLeft': moveMaze(1,0); break;
      case 'ArrowRight': moveMaze(-1,0); break;
    }
  };
}

function generateMaze(size) {
  // Simple maze: random walls with guaranteed path
  let grid = Array(size).fill(null).map(() => Array(size).fill(1));
  // Create path using recursive backtracker
  function carve(x, y) {
    grid[y][x] = 0;
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random()-0.5);
    for (const [dx,dy] of dirs) {
      const nx = x+dx, ny = y+dy;
      if (nx >= 0 && nx < size && ny >= 0 && ny < size && grid[ny][nx] === 1) {
        grid[y+dy/2][x+dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  carve(0, 0);
  // Ensure goal is reachable
  grid[size-1][size-1] = 0;
  if (size > 2) {
    grid[size-1][size-2] = 0;
    grid[size-2][size-1] = 0;
  }
  return grid;
}

function renderMaze() {
  const board = document.getElementById('mazeBoard');
  if (!board) return;
  board.innerHTML = '';
  board.style.width = (mazeSize * 31) + 'px';
  for (let y = 0; y < mazeSize; y++) {
    for (let x = 0; x < mazeSize; x++) {
      const cell = document.createElement('div');
      cell.className = 'maze-cell';
      if (x === mazePlayer.x && y === mazePlayer.y) cell.classList.add('player');
      else if (x === mazeGoal.x && y === mazeGoal.y) cell.classList.add('goal');
      else if (mazeGrid[y][x] === 1) cell.classList.add('wall');
      else cell.classList.add('path');
      board.appendChild(cell);
    }
  }
}

function moveMaze(dx, dy) {
  const nx = mazePlayer.x + dx;
  const ny = mazePlayer.y + dy;
  if (nx < 0 || nx >= mazeSize || ny < 0 || ny >= mazeSize) return;
  if (mazeGrid[ny][nx] === 1) return;
  playClick();
  mazePlayer.x = nx;
  mazePlayer.y = ny;
  renderMaze();
  if (nx === mazeGoal.x && ny === mazeGoal.y) {
    updateScore(15 * currentLevel);
    setTimeout(() => showWinMessage('وصلت! أنت بطل المتاهة! 🏰'), 300);
  }
}

// ============================
// ===== 6. FOOTBALL GAME =====
// ============================
let footballGoals, footballTotal, footballRound, footballScore;

function initFootball() {
  footballTotal = 3 + currentLevel;
  footballRound = 0;
  footballGoals = 0;
  footballScore = 0;
  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="fbStatus">⚽ سدد الكرة في المرمى! الجولة ${footballRound + 1}/${footballTotal}</div>
    <div class="football-field" id="fbField">
      <div class="goal-post">
        <div class="goal-zone" onclick="kickFootball(0)"></div>
        <div class="goal-zone" onclick="kickFootball(1)"></div>
        <div class="goal-zone" onclick="kickFootball(2)"></div>
      </div>
      <div class="goalkeeper" id="fbKeeper">🧤</div>
      <div class="football" id="fbBall">⚽</div>
    </div>
    <div style="color:var(--text-secondary);font-size:0.9rem;margin-top:10px">الأهداف: <span id="fbGoals">0</span>/${footballTotal}</div>
  `;
}

function kickFootball(zone) {
  if (footballRound >= footballTotal) return;
  footballRound++;
  const keeper = document.getElementById('fbKeeper');
  const ball = document.getElementById('fbBall');
  
  // Keeper moves randomly
  const keeperZone = Math.floor(Math.random() * 3);
  keeper.style.left = (25 + keeperZone * 25) + '%';
  
  // Ball moves
  const zoneLeft = 25 + zone * 25;
  ball.style.left = zoneLeft + '%';
  ball.classList.add('kicked');

  const scored = zone !== keeperZone;
  if (scored) {
    footballGoals++;
    updateScore(5 * currentLevel);
    document.getElementById('fbGoals').textContent = footballGoals;
    document.getElementById('fbStatus').textContent = '⚽ هـــدف! 🎉';
    playWin();
  } else {
    document.getElementById('fbStatus').textContent = '🧤 تصدى الحارس! 😢';
    playLose();
  }

  if (footballRound >= footballTotal) {
    setTimeout(() => {
      if (footballGoals >= footballTotal / 2) {
        showWinMessage(`سجلت ${footballGoals} من ${footballTotal} أهداف! ⚽`);
      } else {
        showLoseMessage(`سجلت ${footballGoals} من ${footballTotal} فقط`);
      }
    }, 1500);
  } else {
    setTimeout(() => {
      document.getElementById('fbStatus').textContent = `⚽ الجولة ${footballRound + 1}/${footballTotal}`;
      ball.classList.remove('kicked');
      ball.style.left = '50%';
      keeper.style.left = '50%';
    }, 1500);
  }
}

// ============================
// ===== 7. KNIFE THROW =======
// ============================
let knifeStuck, knifeTarget, knifeRound, knifeNeeded, knifeAngle;

function initKnife() {
  knifeStuck = [];
  knifeRound = 0;
  knifeNeeded = 3 + currentLevel * 2;
  knifeAngle = 0;
  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="knifeStatus">🔪 ارمِ ${knifeNeeded} سكاكين على الهدف!</div>
    <div class="knife-target" id="knifeTarget">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="center"></div>
    </div>
    <div style="color:var(--text-secondary);font-size:0.8rem;margin-top:5px">السكاكين المتبقية: <span id="knifeLeft">${knifeNeeded}</span></div>
    <button class="throw-btn" id="knifeThrowBtn" onclick="throwKnife()">🔪 ارمِ السكين!</button>
  `;
  // Rotate target
  animateKnifeTarget();
}

function animateKnifeTarget() {
  const target = document.getElementById('knifeTarget');
  if (!target) return;
  let angle = 0;
  const speed = 1 + currentLevel * 0.5;
  window._gameInterval = setInterval(() => {
    angle += speed;
    target.style.transform = `rotate(${angle}deg)`;
    knifeAngle = angle;
  }, 20);
}

function throwKnife() {
  if (knifeRound >= knifeNeeded) return;
  knifeRound++;
  playClick();
  document.getElementById('knifeLeft').textContent = knifeNeeded - knifeRound;

  const target = document.getElementById('knifeTarget');
  const currentAngle = knifeAngle % 360;
  
  // Check if knife hits another knife
  for (const stuckAngle of knifeStuck) {
    let diff = Math.abs(currentAngle - stuckAngle);
    if (diff > 180) diff = 360 - diff;
    if (diff < 15) {
      playLose();
      clearInterval(window._gameInterval);
      showLoseMessage('السكين اصطدمت بسكين أخرى! 🔪');
      return;
    }
  }

  knifeStuck.push(currentAngle);
  updateScore(5 * currentLevel);

  // Visual knife
  const knife = document.createElement('div');
  knife.className = 'knife-stuck';
  knife.textContent = '🔪';
  const rad = (currentAngle - 90) * Math.PI / 180;
  const r = 85;
  knife.style.left = (90 + Math.cos(rad) * r - 10) + 'px';
  knife.style.top = (90 + Math.sin(rad) * r - 10) + 'px';
  knife.style.transform = `rotate(${currentAngle}deg)`;
  target.appendChild(knife);

  if (knifeRound >= knifeNeeded) {
    clearInterval(window._gameInterval);
    setTimeout(() => showWinMessage('أصبت كل السكاكين! 🎯'), 500);
  }
}

// ============================
// ===== 8. PUZZLE GAME =======
// ============================
let puzzleTiles, puzzleSize, puzzleMoves;

function initPuzzle() {
  puzzleSize = 3 + Math.floor(currentLevel / 2);
  if (puzzleSize > 4) puzzleSize = 4;
  puzzleMoves = 0;
  puzzleTiles = generateSolvablePuzzle(puzzleSize);

  const body = document.getElementById('gameBody');
  body.innerHTML = `
    <div class="game-status" id="puzzleStatus">🧩 رتب الأرقام من 1 إلى ${puzzleSize*puzzleSize - 1}</div>
    <div class="puzzle-board" id="puzzleBoard" style="grid-template-columns:repeat(${puzzleSize},65px)"></div>
    <div style="color:var(--text-secondary);font-size:0.8rem;margin-top:8px">الحركات: <span id="puzzleMoves">0</span></div>
  `;
  renderPuzzle();
}

function generateSolvablePuzzle(size) {
  let tiles = [];
  for (let i = 1; i < size * size; i++) tiles.push(i);
  tiles.push(0); // empty
  
  // Shuffle with valid moves
  for (let i = 0; i < 100 + currentLevel * 50; i++) {
    const emptyIdx = tiles.indexOf(0);
    const neighbors = [];
    const row = Math.floor(emptyIdx / size);
    const col = emptyIdx % size;
    if (row > 0) neighbors.push(emptyIdx - size);
    if (row < size-1) neighbors.push(emptyIdx + size);
    if (col > 0) neighbors.push(emptyIdx - 1);
    if (col < size-1) neighbors.push(emptyIdx + 1);
    const swap = neighbors[Math.floor(Math.random() * neighbors.length)];
    [tiles[emptyIdx], tiles[swap]] = [tiles[swap], tiles[emptyIdx]];
  }
  return tiles;
}

function renderPuzzle() {
  const board = document.getElementById('puzzleBoard');
  board.innerHTML = '';
  board.style.width = (puzzleSize * 70) + 'px';
  puzzleTiles.forEach((val, i) => {
    const tile = document.createElement('div');
    tile.className = 'puzzle-tile' + (val === 0 ? ' empty' : '');
    tile.textContent = val || '';
    if (val !== 0) tile.onclick = () => movePuzzle(i);
    board.appendChild(tile);
  });
}

function movePuzzle(idx) {
  const emptyIdx = puzzleTiles.indexOf(0);
  const row = Math.floor(idx / puzzleSize);
  const col = idx % puzzleSize;
  const eRow = Math.floor(emptyIdx / puzzleSize);
  const eCol = emptyIdx % puzzleSize;
  
  if ((Math.abs(row - eRow) + Math.abs(col - eCol)) === 1) {
    playClick();
    puzzleMoves++;
    document.getElementById('puzzleMoves').textContent = puzzleMoves;
    [puzzleTiles[idx], puzzleTiles[emptyIdx]] = [puzzleTiles[emptyIdx], puzzleTiles[idx]];
    renderPuzzle();
    
    // Check win
    let solved = true;
    for (let i = 0; i < puzzleTiles.length - 1; i++) {
      if (puzzleTiles[i] !== i + 1) { solved = false; break; }
    }
    if (solved) {
      const points = Math.max(5, 50 - puzzleMoves) * currentLevel;
      updateScore(points);
      setTimeout(() => showWinMessage('حللت الأحجية! 🧩'), 300);
    }
  }
}

// ===== INIT =====
window.addEventListener('load', () => {
  renderCards();
  let totalBest = 0;
  let totalLevels = 0;
  games.forEach(g => {
    totalBest += getScore(g.id);
    totalLevels += g.levels;
  });
  document.getElementById('totalBest').textContent = totalBest;
  document.getElementById('totalLevels').textContent = totalLevels;

  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
  }, 1200);
});

// Close modal on backdrop click
document.getElementById('gameModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('gameModal')) closeGame();
});
