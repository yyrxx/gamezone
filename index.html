<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎮 GameZone - عالم الألعاب</title>
<style>
/* ===== CORE STYLES (UNCHANGED LOOK) ===== */
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-card: #1a1a3e;
  --text-primary: #ffffff;
  --text-secondary: #a0a0cc;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --accent3: #fd79a8;
  --accent4: #fdcb6e;
  --accent5: #55efc4;
  --gradient1: linear-gradient(135deg, #6c5ce7, #a29bfe);
  --gradient2: linear-gradient(135deg, #00cec9, #81ecec);
  --gradient3: linear-gradient(135deg, #fd79a8, #fab1a0);
  --gradient4: linear-gradient(135deg, #fdcb6e, #f39c12);
  --gradient5: linear-gradient(135deg, #55efc4, #00b894);
  --shadow: 0 10px 40px rgba(0,0,0,0.4);
  --shadow-hover: 0 20px 60px rgba(108,92,231,0.3);
  --radius: 20px;
  --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f0f0ff;
    --bg-secondary: #e8e8f8;
    --bg-card: #ffffff;
    --text-primary: #1a1a3e;
    --text-secondary: #6666aa;
    --shadow: 0 10px 40px rgba(108,92,231,0.15);
    --shadow-hover: 0 20px 60px rgba(108,92,231,0.25);
  }
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; transition: background 0.5s; }

/* Background Animation */
.bg-animation { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 0; overflow: hidden; pointer-events: none; }
.bg-animation .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: floatOrb 20s infinite ease-in-out; }
.orb:nth-child(1) { width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation-delay:0s; }
.orb:nth-child(2) { width:300px;height:300px;background:var(--accent2);top:50%;right:-50px;animation-delay:-5s; }
.orb:nth-child(3) { width:350px;height:350px;background:var(--accent3);bottom:-100px;left:30%;animation-delay:-10s; }
.orb:nth-child(4) { width:250px;height:250px;background:var(--accent4);top:30%;left:50%;animation-delay:-15s; }
@keyframes floatOrb { 0%,100% { transform:translate(0,0) scale(1); } 25% { transform:translate(100px,-50px) scale(1.1); } 50% { transform:translate(-50px,100px) scale(0.9); } 75% { transform:translate(80px,50px) scale(1.05); } }

.container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:20px; }

/* Hero */
.hero { text-align:center; padding:40px 0 30px; animation:fadeInDown 1s ease; }
.hero-logo { font-size:clamp(2.5rem,8vw,4.5rem); font-weight:900; background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; letter-spacing:-1px; }
.hero-logo .emoji { -webkit-text-fill-color:initial; animation:bounce 2s infinite; display:inline-block; }
.hero-subtitle { color:var(--text-secondary); font-size:clamp(0.9rem,2.5vw,1.2rem); font-weight:300; letter-spacing:2px; }
.stats-bar { display:flex; justify-content:center; gap:20px; margin-top:20px; flex-wrap:wrap; }
.stat-item { background:var(--bg-card); padding:10px 20px; border-radius:50px; font-size:0.85rem; color:var(--text-secondary); backdrop-filter:blur(10px); border:1px solid rgba(108,92,231,0.2); }
.stat-item span { color:var(--accent2); font-weight:700; }
@keyframes fadeInDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.section-title { font-size:1.5rem; font-weight:700; margin:30px 0 20px; display:flex; align-items:center; gap:10px; }
.section-title::before { content:''; width:4px; height:30px; background:var(--gradient1); border-radius:2px; }

/* Games Grid */
.games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; padding-bottom:40px; }
.game-card { background:var(--bg-card); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:var(--transition); border:1px solid rgba(108,92,231,0.1); position:relative; animation:fadeInUp 0.6s ease backwards; }
.game-card:nth-child(1){animation-delay:.1s} .game-card:nth-child(2){animation-delay:.2s} .game-card:nth-child(3){animation-delay:.3s} .game-card:nth-child(4){animation-delay:.4s} .game-card:nth-child(5){animation-delay:.5s} .game-card:nth-child(6){animation-delay:.6s}
@keyframes fadeInUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
.game-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:var(--shadow-hover); border-color:rgba(108,92,231,0.4); }
.game-card:active { transform:translateY(-4px) scale(0.98); }
.card-image { height:160px; display:flex; align-items:center; justify-content:center; font-size:4rem; position:relative; overflow:hidden; }
.card-image::after { content:''; position:absolute; bottom:0; left:0; right:0; height:50%; background:linear-gradient(transparent,var(--bg-card)); }
.card-image .game-icon { z-index:1; transition:var(--transition); filter:drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
.game-card:hover .game-icon { transform:scale(1.2) rotate(5deg); }
.card-body { padding:15px 20px 20px; }
.card-body h3 { font-size:1.15rem; font-weight:700; margin-bottom:5px; }
.card-body p { font-size:0.8rem; color:var(--text-secondary); margin-bottom:12px; line-height:1.5; }
.card-footer { display:flex; justify-content:space-between; align-items:center; }
.card-level { font-size:0.75rem; padding:4px 12px; border-radius:50px; background:rgba(108,92,231,0.15); color:var(--accent); font-weight:600; }
.card-score { font-size:0.75rem; color:var(--accent4); font-weight:600; }

/* Ad Banners */
.ad-banner {
  width: 100%;
  height: 100px;
  background: rgba(255,255,255,0.05);
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin: 20px 0;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Modal */
.game-modal { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; display:none; align-items:center; justify-content:center; background:rgba(10,10,26,0.95); backdrop-filter:blur(20px); padding:15px; animation:fadeIn .3s ease; }
.game-modal.active { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.game-container { background:var(--bg-secondary); border-radius:var(--radius); width:100%; max-width:600px; max-height:90vh; overflow-y:auto; position:relative; animation:slideUp .4s cubic-bezier(.175,.885,.32,1.275); border:1px solid rgba(108,92,231,0.2); }
@keyframes slideUp { from{opacity:0;transform:translateY(50px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
.game-header { padding:20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(108,92,231,0.15); position:sticky; top:0; background:var(--bg-secondary); z-index:10; border-radius:var(--radius) var(--radius) 0 0; }
.game-header h2 { font-size:1.2rem; display:flex; align-items:center; gap:8px; }
.game-info { display:flex; gap:15px; font-size:0.85rem; }
.game-info span { color:var(--accent4); font-weight:700; }
.close-btn { width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,0.1); color:var(--text-primary); font-size:1.2rem; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; }
.close-btn:hover { background:rgba(253,121,168,0.3); transform:rotate(90deg); }
.game-body { padding:20px; min-height:300px; display:flex; flex-direction:column; align-items:center; }

/* Generic Buttons & Status */
.game-status { font-size:1.1rem; margin:15px 0; font-weight:600; min-height:30px; text-align:center; }
.play-btn { padding:12px 30px; border:none; border-radius:50px; background:var(--gradient1); color:white; font-size:1rem; font-weight:700; cursor:pointer; transition:var(--transition); margin-top:10px; }
.play-btn:hover { transform:scale(1.05); box-shadow:0 5px 20px rgba(108,92,231,0.4); }
.play-btn:active { transform:scale(0.95); }
.mode-select { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-top: 20px; }
.mode-btn { padding: 15px; border: 1px solid rgba(108,92,231,0.3); background: var(--bg-card); color: var(--text-primary); border-radius: 15px; font-size: 1rem; cursor: pointer; transition: var(--transition); }
.mode-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.02); }

/* Specific Games Styles */
.xo-board { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:280px; margin:20px 0; }
.xo-cell { width:85px; height:85px; background:var(--bg-card); border-radius:15px; border:2px solid rgba(108,92,231,0.2); font-size:2.2rem; font-weight:900; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; color:var(--text-primary); }
.xo-cell:hover:not(.taken) { border-color:var(--accent); background:rgba(108,92,231,0.1); transform:scale(1.05); }
.xo-cell.x { color:var(--accent); } .xo-cell.o { color:var(--accent3); }
.xo-cell.win { animation:winPulse .5s ease; border-color:var(--accent4); background:rgba(253,203,110,0.2); }
@keyframes winPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

.memory-board { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; width:300px; margin:20px 0; }
.memory-card { width:68px; height:68px; background:var(--bg-card); border-radius:12px; border:2px solid rgba(108,92,231,0.2); font-size:1.8rem; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; position:relative; }
.memory-card .card-front { display:none; }
.memory-card .card-back { font-size:1.5rem; color:var(--accent); }
.memory-card.flipped { border-color:var(--accent2); background:rgba(0,206,201,0.1); }
.memory-card.flipped .card-front { display:block; }
.memory-card.flipped .card-back { display:none; }
.memory-card.matched { border-color:var(--accent5); background:rgba(85,239,196,0.15); animation:matchPop .4s ease; }
@keyframes matchPop { 0%{transform:scale(1)} 50%{transform:scale(1.15) rotate(5deg)} 100%{transform:scale(1)} }

.click-area-war { display: flex; justify-content: space-around; width: 100%; margin: 20px 0; }
.click-player-zone { text-align: center; width: 45%; }
.click-big-btn { width: 100%; height: 150px; border-radius: 20px; border: none; font-size: 1.5rem; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; margin-top: 10px; }
.click-p1 { background: var(--gradient1); }
.click-p2 { background: var(--gradient3); }
.click-big-btn:active { transform: scale(0.95); }

.word-display { font-size:2.5rem; letter-spacing:5px; margin:20px 0; font-weight:700; color:var(--accent2); }
.word-hint-box { background: rgba(253, 203, 110, 0.1); padding: 10px 20px; border-radius: 10px; color: var(--accent4); margin-bottom: 20px; border: 1px solid rgba(253, 203, 110, 0.3); }
.letter-keyboard { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:350px; margin:10px 0; }
.letter-btn { width:38px; height:38px; border-radius:10px; border:1px solid rgba(108,92,231,0.2); background:var(--bg-card); color:var(--text-primary); font-size:1rem; font-weight:600; cursor:pointer; transition:var(--transition); }
.letter-btn:hover:not(:disabled) { background:var(--accent); border-color:var(--accent); transform:scale(1.1); }
.letter-btn:disabled { opacity:0.3; cursor:not-allowed; }
.letter-btn.correct { background:var(--accent5); border-color:var(--accent5); color:#000; }
.letter-btn.wrong { background:var(--accent3); border-color:var(--accent3); }

.maze-board { display:grid; gap:1px; margin:15px 0; background:rgba(108,92,231,0.1); padding:8px; border-radius:15px; }
.maze-cell { width:25px; height:25px; border-radius:4px; transition:background .2s; }
.maze-cell.wall { background:var(--bg-card); }
.maze-cell.path { background:rgba(108,92,231,0.05); }
.maze-cell.player { background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent); transform: scale(0.8); }
.maze-cell.goal { background:var(--accent4); border-radius:50%; box-shadow:0 0 10px var(--accent4); animation: goalPulse 1s infinite; }
@keyframes goalPulse { 0%,100%{transform:scale(0.8)} 50%{transform:scale(1)} }
.maze-controls { display:grid; grid-template-columns:repeat(3,50px); grid-template-rows:repeat(2,50px); gap:5px; margin-top:10px; }
.maze-btn { width:50px; height:50px; border-radius:12px; border:none; background:var(--bg-card); color:var(--text-primary); font-size:1.2rem; cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center; }
.maze-btn:hover { background:var(--accent); }

.puzzle-board { display:grid; gap:2px; margin:15px 0; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 10px; }
.puzzle-piece { background-size: 200% 200%; cursor: pointer; border-radius: 5px; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.1); }
.puzzle-piece.empty { background: transparent !important; border: none; cursor: default; }
.puzzle-preview { width: 100px; height: 100px; border-radius: 10px; border: 2px solid var(--accent); margin-bottom: 10px; background-size: cover; }

.score-modal { text-align:center; padding:30px; }
.score-modal .big-emoji { font-size:4rem; margin-bottom:15px; animation:bounce 1s infinite; }
.score-modal h2 { font-size:1.5rem; margin-bottom:10px; }
.score-modal .score-value { font-size:2.5rem; font-weight:900; background:linear-gradient(135deg,var(--accent4),var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:10px 0; }
.score-modal .best-score { color:var(--accent2); font-size:0.9rem; margin-bottom:20px; }

.loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-primary); z-index:10000; display:flex; align-items:center; justify-content:center; flex-direction:column; transition:opacity .5s; }
.loading-screen.hidden { opacity:0; pointer-events:none; }
.loader { width:60px; height:60px; border:4px solid rgba(108,92,231,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:20px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color:var(--text-secondary); font-size:0.9rem; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

/* Responsive */
@media(max-width:600px) {
  .games-grid { grid-template-columns:1fr; }
  .game-card { display:flex; flex-direction:row; align-items:center; }
  .card-image { width:100px; height:100px; flex-shrink:0; border-radius:var(--radius) 0 0 var(--radius); }
  .card-image::after { background:linear-gradient(to right,transparent,var(--bg-card)); width:50%; height:100%; }
  .card-body { flex:1; padding:15px; }
  .xo-board { width:240px; } .xo-cell { width:72px; height:72px; font-size:1.8rem; }
  .memory-board { width:260px; } .memory-card { width:58px; height:58px; }
  .click-area-war { flex-direction: column; gap: 20px; align-items: center; }
  .click-player-zone { width: 100%; }
}
@media(min-width:601px) and (max-width:900px) { .games-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div class="loading-text">جاري تحميل الألعاب...</div>
</div>

<!-- ANIMATED BACKGROUND -->
<div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<!-- MAIN CONTAINER -->
<div class="container">
  <div class="hero">
    <div class="hero-logo"><span class="emoji">🎮</span> GameZone</div>
    <p class="hero-subtitle">عالم الألعاب بين يديك</p>
    <div class="stats-bar">
      <div class="stat-item">🎮 الألعاب: <span>6</span></div>
      <div class="stat-item">⭐ أفضل نتيجة: <span id="totalBest">0</span></div>
    </div>
  </div>

  <!-- AD SPACE TOP -->
  <div class="ad-banner">مساحة إعلانية</div>

  <div class="section-title">🕹️ اختر لعبتك</div>
  <div class="games-grid" id="gamesGrid"></div>

  <!-- AD SPACE BOTTOM -->
  <div class="ad-banner">مساحة إعلانية</div>
</div>

<!-- GAME MODAL -->
<div class="game-modal" id="gameModal">
  <div class="game-container">
    <div class="game-header">
      <h2 id="gameTitle"></h2>
      <div class="game-info">
        <div>⭐ النقاط: <span id="gameScore">0</span></div>
        <div>🏆 الأفضل: <span id="gameBest">0</span></div>
      </div>
      <button class="close-btn" onclick="closeGame()">✕</button>
    </div>
    <div class="game-body" id="gameBody"></div>
  </div>
</div>

<script>
// ===== SOUND ENGINE =====
var audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(freq,dur,type,vol){
  try{initAudio();var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function playClick(){playSound(800,0.1,'sine',0.1)}
function playWin(){playSound(523,0.15,'sine',0.12);setTimeout(function(){playSound(659,0.15,'sine',0.12)},100);setTimeout(function(){playSound(784,0.3,'sine',0.12)},200)}
function playLose(){playSound(200,0.4,'sawtooth',0.08)}
function playMatch(){playSound(600,0.1,'sine',0.1);setTimeout(function(){playSound(900,0.15,'sine',0.1)},80)}
function playFlip(){playSound(400,0.08,'sine',0.08)}

// ===== DATA & STATE =====
var games=[
  {id:'xo',name:'إكس أو Pro',icon:'❌⭕',desc:'ضد صديق أو الذكاء الاصطناعي',gradient:'var(--gradient1)'},
  {id:'memory',name:'اختبار الذاكرة',icon:'🧠',desc:'تذكر الأماكن بسرعة البرق',gradient:'var(--gradient2)'},
  {id:'clickspeed',name:'حرب النقر',icon:'⚡',desc:'من الأسرع؟ ضد صديق أو AI',gradient:'var(--gradient3)'},
  {id:'wordguess',name:'كلمات وألغاز',icon:'🔤',desc:'خمن الكلمة العربية مع تلميح',gradient:'var(--gradient4)'},
  {id:'maze',name:'المتاهة',icon:'🏰',desc:'جد الطريق للخروج',gradient:'var(--gradient5)'},
  {id:'puzzle',name:'أحجية الصور',icon:'🧩',desc:'ركب الصورة المقطعة',gradient:'var(--gradient2)'}
];

var currentGame=null, score=0;
var _gameInterval=null,_gameTimeout=null;

function saveScore(game,sc){var k='gz_'+game;var p=parseInt(localStorage.getItem(k))||0;if(sc>p){localStorage.setItem(k,sc);return true}return false}
function getScore(game){return parseInt(localStorage.getItem('gz_'+game))||0}

// ===== RENDER CARDS =====
function renderCards(){
  var g=document.getElementById('gamesGrid');g.innerHTML='';
  // Insert Ad after 2nd item
  var adIndex = Math.ceil(games.length / 2);
  
  games.forEach(function(gr,i){
    if(i === adIndex) {
      var adDiv = document.createElement('div');
      adDiv.className = 'ad-banner';
      adDiv.style.gridColumn = '1 / -1';
      adDiv.textContent = 'مساحة إعلانية';
      g.appendChild(adDiv);
    }
    
    var best=getScore(gr.id);
    var c=document.createElement('div');c.className='game-card';
    c.style.animationDelay=(i*0.1)+'s';
    c.onclick=function(){openGame(gr.id)};
    c.innerHTML='<div class="card-image" style="background:'+gr.gradient+'"><span class="game-icon">'+gr.icon+'</span></div><div class="card-body"><h3>'+gr.name+'</h3><p>'+gr.desc+'</p><div class="card-footer"><span class="card-level">🎮 العب الآن</span><span class="card-score">🏆 '+best+'</span></div></div>';
    g.appendChild(c);
  });
}

// ===== OPEN/CLOSE =====
function openGame(id){
  playClick();currentGame=id;score=0;
  var g=games.find(function(x){return x.id===id});
  document.getElementById('gameTitle').innerHTML=g.icon+' '+g.name;
  document.getElementById('gameScore').textContent=0;
  document.getElementById('gameBest').textContent=getScore(id);
  document.getElementById('gameModal').classList.add('active');
  document.body.style.overflow='hidden';
  showModeSelect(id);
}
function closeGame(){
  playClick();document.getElementById('gameModal').classList.remove('active');
  document.body.style.overflow='';currentGame=null;
  if(_gameInterval)clearInterval(_gameInterval);
  if(_gameTimeout)clearTimeout(_gameTimeout);
  document.onkeydown = null; // clear keys
  renderCards();
}
document.getElementById('gameModal').addEventListener('click',function(e){
  if(e.target===document.getElementById('gameModal'))closeGame();
});

function updateScore(ns){
  score=ns;document.getElementById('gameScore').textContent=score;
  saveScore(currentGame,score);
  document.getElementById('gameBest').textContent=getScore(currentGame);
}

function showWinMessage(msg){
  playWin();
  document.getElementById('gameBody').innerHTML=
    '<div class="score-modal"><div class="big-emoji">🎉</div><h2>'+msg+'</h2><div class="score-value">'+score+' نقطة</div><div class="best-score">🏆 أفضل نتيجة: '+getScore(currentGame)+'</div><button class="play-btn" onclick="showModeSelect(currentGame)">العب مرة أخرى 🔄</button></div>';
}
function showLoseMessage(msg){
  playLose();
  document.getElementById('gameBody').innerHTML=
    '<div class="score-modal"><div class="big-emoji">😢</div><h2>'+msg+'</h2><div class="score-value">'+score+' نقطة</div><div class="best-score">🏆 أفضل نتيجة: '+getScore(currentGame)+'</div><button class="play-btn" onclick="initGame(currentGame, lastMode, lastDifficulty)">حاول مرة أخرى 🔄</button></div>';
}

var lastMode = null;
var lastDifficulty = null;

function showModeSelect(id) {
  var body = document.getElementById('gameBody');
  var html = '<div class="game-status">اختر وضع اللعب</div><div class="mode-select">';
  
  if(id === 'xo') {
    html += '<button class="mode-btn" onclick="initGame(\'xo\', \'friend\')">👥 ضد صديق (محلي)</button>';
    html += '<button class="mode-btn" onclick="initGame(\'xo\', \'ai\', \'easy\')">🤖 ضد كمبيوتر (سهل)</button>';
    html += '<button class="mode-btn" onclick="initGame(\'xo\', \'ai\', \'medium\')">🤖 ضد كمبيوتر (متوسط)</button>';
    html += '<button class="mode-btn" onclick="initGame(\'xo\', \'ai\', \'hard\')">🤖 ضد كمبيوتر (مستحيل)</button>';
  } else if (id === 'clickspeed') {
     html += '<button class="mode-btn" onclick="initGame(\'clickspeed\', \'friend\')">👥 ضد صديق (نفس الجهاز)</button>';
     html += '<button class="mode-btn" onclick="initGame(\'clickspeed\', \'ai\', \'easy\')">🤖 ضد كمبيوتر (بطيء)</button>';
     html += '<button class="mode-btn" onclick="initGame(\'clickspeed\', \'ai\', \'medium\')">🤖 ضد كمبيوتر (سريع)</button>';
     html += '<button class="mode-btn" onclick="initGame(\'clickspeed\', \'ai\', \'hard\')">🤖 ضد كمبيوتر (برقّي)</button>';
  } else if (id === 'puzzle') {
     html += '<button class="mode-btn" onclick="initGame(\'puzzle\', \'easy\')">🟢 سهل (3×3)</button>';
     html += '<button class="mode-btn" onclick="initGame(\'puzzle\', \'medium\')">🟡 متوسط (4×4)</button>';
     html += '<button class="mode-btn" onclick="initGame(\'puzzle\', \'hard\')">🔴 صعب (5×5)</button>';
  } else {
    // For others, just start
    html += '<button class="mode-btn" onclick="initGame(\''+id+'\')">🎮 ابدأ اللعب</button>';
  }
  
  html += '</div>';
  body.innerHTML = html;
}

function initGame(id, mode, diff) {
  if(_gameInterval)clearInterval(_gameInterval);
  if(_gameTimeout)clearTimeout(_gameTimeout);
  lastMode = mode || 'default';
  lastDifficulty = diff || 'normal';
  score = 0;
  document.getElementById('gameScore').textContent = 0;

  switch(id){
    case 'xo':initXO(mode, diff);break;
    case 'memory':initMemory();break;
    case 'clickspeed':initClickSpeed(mode, diff);break;
    case 'wordguess':initWordGuess();break;
    case 'maze':initMaze();break;
    case 'puzzle':initPuzzle(mode);break;
  }
}

// ===== 1. XO GAME =====
var xoBoard,xoTurn,xoGameOver,xoMode,xoDiff;
function initXO(mode, diff){
  xoBoard=['','','','','','','','',''];xoTurn='X';xoGameOver=false;
  xoMode=mode; xoDiff=diff;
  var statusText = mode === 'friend' ? 'دور اللاعب ❌' : 'دورك! أنت ❌';
  document.getElementById('gameBody').innerHTML=
    '<div class="game-status" id="xoStatus">'+statusText+'</div><div class="xo-board" id="xoBoard"></div>';
  var b=document.getElementById('xoBoard');
  for(var i=0;i<9;i++){
    var c=document.createElement('div');c.className='xo-cell';
    (function(idx){c.onclick=function(){xoMove(idx)}})(i);
    b.appendChild(c);
  }
}
function xoMove(i){
  if(xoBoard[i]||xoGameOver)return;
  playClick();
  xoBoard[i]=xoTurn;
  var cells=document.querySelectorAll('.xo-cell');
  cells[i].textContent=xoTurn==='X'?'❌':'⭕';
  cells[i].classList.add('taken', xoTurn.toLowerCase());
  
  if(checkXOWin(xoTurn)){
    xoGameOver=true;
    var winner = xoTurn === 'X' ? 'اللاعب ❌' : 'اللاعب ⭕';
    if(xoMode === 'ai') winner = xoTurn === 'X' ? 'أنت فزت! 🎉' : 'الكمبيوتر فاز! 🤖';
    updateScore(xoTurn==='X'?10:5);
    showWinMessage(winner); return;
  }
  if(!xoBoard.includes('')){xoGameOver=true;showLoseMessage('تعادل! 🤝');return}
  
  xoTurn = xoTurn==='X'?'O':'X';
  
  if(xoMode === 'friend'){
    document.getElementById('xoStatus').textContent = 'دور اللاعب ' + (xoTurn==='X'?'❌':'⭕');
  } else {
    document.getElementById('xoStatus').textContent = 'دور الكمبيوتر...';
    _gameTimeout=setTimeout(xoAI_Move, 600);
  }
}
function xoAI_Move(){
  if(xoGameOver) return;
  var move;
  // Logic based on difficulty
  if(xoDiff === 'easy'){
    var avail=[];for(var i=0;i<9;i++)if(xoBoard[i]==='')avail.push(i);
    move=avail[Math.floor(Math.random()*avail.length)];
  } else {
    // Medium/Hard logic (Win -> Block -> Center -> Random)
    // Try Win
    for(var i=0;i<9;i++){if(xoBoard[i]===''){xoBoard[i]='O';if(checkXOWin('O','silent')){move=i;xoBoard[i]='';break}xoBoard[i]=''}}
    // Block
    if(move===undefined){for(var i=0;i<9;i++){if(xoBoard[i]===''){xoBoard[i]='X';if(checkXOWin('X','silent')){move=i;xoBoard[i]='';break}xoBoard[i]=''}}}
    // Center/Random
    if(move===undefined){
       if(xoBoard[4]==='') move=4;
       else {
         var corners=[0,2,6,8].filter(function(i){return xoBoard[i]===''});
         if(corners.length && xoDiff==='hard') move=corners[Math.floor(Math.random()*corners.length)];
         else { var a=[];for(var i=0;i<9;i++)if(xoBoard[i]==='')a.push(i);move=a[Math.floor(Math.random()*a.length)]}
       }
    }
  }
  xoMove(move);
}
function checkXOWin(m, silent){
  var w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  var cells=document.querySelectorAll('.xo-cell');
  for(var i=0;i<w.length;i++){
    if(xoBoard[w[i][0]]===m&&xoBoard[w[i][1]]===m&&xoBoard[w[i][2]]===m){
      if(!silent){cells[w[i][0]].classList.add('win');cells[w[i][1]].classList.add('win');cells[w[i][2]].classList.add('win');}
      return true;
    }
  }return false;
}

// ===== 2. MEMORY GAME (Enhanced) =====
var memFlipped,memMatched,memLocked,memTotalPairs,memTimer;
function initMemory(){
  var emojis=['🍎','🍊','🍋','🍇','🍓','🫐','🍑','🥝','🍌','🍒','🥭','🍍'];
  var pairs = 6; // Standard 4x3 or 4x4
  var cols = 4;
  var selected=emojis.slice(0,pairs);
  var deck=selected.concat(selected);
  deck.sort(function(){return Math.random()-0.5});
  memFlipped=[];memMatched=0;memLocked=false;memTotalPairs=pairs;
  
  document.getElementById('gameBody').innerHTML=
    '<div class="game-status">⏱️ الوقت: <span id="memTime">0</span> ثانية</div><div class="memory-board" id="memoryBoard" style="grid-template-columns:repeat('+cols+',1fr)"></div>';
  
  var board=document.getElementById('memoryBoard');
  board.style.width=(cols*78)+'px';
  deck.forEach(function(emoji,i){
    var c=document.createElement('div');c.className='memory-card';
    c.dataset.emoji=emoji;
    c.innerHTML='<span class="card-front">'+emoji+'</span><span class="card-back">❓</span>';
    c.onclick=function(){flipMemoryCard(c)};
    board.appendChild(c);
  });
  
  var time = 0;
  _gameInterval = setInterval(function(){
    time++;
    var el = document.getElementById('memTime');
    if(el) el.textContent = time;
  }, 1000);
}
function flipMemoryCard(card){
  if(memLocked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  playFlip();card.classList.add('flipped');memFlipped.push(card);
  if(memFlipped.length===2){
    memLocked=true;
    var a=memFlipped[0],b=memFlipped[1];
    if(a.dataset.emoji===b.dataset.emoji){
      playMatch();a.classList.add('matched');b.classList.add('matched');memMatched++;
      updateScore(10);
      memFlipped=[];memLocked=false;
      if(memMatched===memTotalPairs){
        clearInterval(_gameInterval);
        showWinMessage('أنهيت الاختبار! 🧠');
      }
    }else{
      _gameTimeout=setTimeout(function(){
        a.classList.remove('flipped');b.classList.remove('flipped');
        memFlipped=[];memLocked=false;
      },800);
    }
  }
}

// ===== 3. CLICK SPEED WAR =====
var clickScores, clickLimit, clickActive;
function initClickSpeed(mode, diff){
  clickScores = {p1:0, p2:0};
  clickLimit = 20; // First to 20 clicks wins
  clickActive = false;
  
  var p2Label = mode === 'ai' ? 'الكمبيوتر 🤖' : 'اللاعب 2 ⭕';
  var btnAction = mode === 'ai' ? '' : 'onclick="clickWarTap(\'p2\')"';
  
  document.getElementById('gameBody').innerHTML=
    '<div class="game-status" id="warStatus">اضغط بأسرع ما يمكن!</div>'+
    '<div class="click-area-war">'+
      '<div class="click-player-zone"><h3>أنت (❌)</h3><div id="scoreP1" style="font-size:2rem;font-weight:bold;color:var(--accent)">0</div><button class="click-big-btn click-p1" onclick="clickWarTap(\'p1\')">اضغط هنا!</button></div>'+
      '<div class="click-player-zone"><h3>'+p2Label+'</h3><div id="scoreP2" style="font-size:2rem;font-weight:bold;color:var(--accent3)">0</div><button class="click-big-btn click-p2" '+btnAction+'>اضغط هنا!</button></div>'+
    '</div>';
    
  if(mode === 'ai') {
    clickActive = true;
    var speed = diff === 'easy' ? 800 : diff === 'medium' ? 400 : 150;
    _gameInterval = setInterval(function(){
      if(!clickActive) return;
      clickScores.p2++;
      document.getElementById('scoreP2').textContent = clickScores.p2;
      checkClickWarWin();
    }, speed);
  } else {
    clickActive = true; // Friend mode waits for taps
  }
}
function clickWarTap(p){
  if(!clickActive) return;
  playClick();
  clickScores[p]++;
  document.getElementById('score'+p.toUpperCase()).textContent = clickScores[p];
  checkClickWarWin();
}
function checkClickWarWin(){
  if(clickScores.p1 >= clickLimit || clickScores.p2 >= clickLimit){
    clickActive = false;
    clearInterval(_gameInterval);
    var winner = clickScores.p1 >= clickLimit ? 'أنت فزت! ⚡' : 'خسرت! 😢';
    if(lastMode !== 'ai') winner = clickScores.p1 > clickScores.p2 ? 'اللاعب 1 فاز!' : 'اللاعب 2 فاز!';
    updateScore(clickScores.p1);
    showWinMessage(winner);
  }
}

// ===== 4. WORD GUESS (Arabic) =====
var wordTarget,wordGuessed,wordLives;
var arWords=[
  {w:'أسد',h:'ملك الغابة'}, {w:'مصر',h:'أم الدنيا'}, {w:'تفاح',h:'فاكهة حمراء أو خضراء'},
  {w:'سيارة',h:'وسيلة نقل لها 4 عجلات'}, {w:'شمس',h:'تضيء الأرض نهاراً'}, {w:'كتاب',h:'خير جليس في الزمان'},
  {w:'سمكة',h:'تعيش في الماء وتتنفس بالخياشيم'}, {w:'طائرة',h:'تطير في السماء'},
  {w:'قلم',h:'أداة للكتابة'}, {w:'بحر',h:'مسطح مائي كبير جداً'}
];

function initWordGuess(){
  var obj = arWords[Math.floor(Math.random()*arWords.length)];
  wordTarget = obj.w;
  var hint = obj.h;
  wordGuessed={};wordLives=6;
  
  var display='';for(var i=0;i<wordTarget.length;i++)display+=' _ ';
  var hearts='❤️'.repeat(wordLives);
  
  document.getElementById('gameBody').innerHTML=
    '<div class="word-hint-box">💡 تلميح: '+hint+'</div>'+
    '<div class="word-display" id="wordDisplay">'+display+'</div>'+
    '<div class="hangman-lives" id="wordLives">'+hearts+'</div>'+
    '<div class="letter-keyboard" id="wordKeyboard"></div>';

  var kb=document.getElementById('wordKeyboard');
  var letters='أبتثجحخدذرزسشصضطظعغفقكلمنهويءآةؤئ';
  for(var i=0;i<letters.length;i++){
    (function(l){
      var btn=document.createElement('button');btn.className='letter-btn';btn.textContent=l;
      btn.onclick=function(){guessArLetter(l,btn)};kb.appendChild(btn);
    })(letters[i]);
  }
}
function guessArLetter(letter,btn){
  btn.disabled=true;playClick();
  if(wordTarget.indexOf(letter)!==-1){
    btn.classList.add('correct');wordGuessed[letter]=true;
    var display='';
    for(var i=0;i<wordTarget.length;i++){
      display+=' '+ (wordGuessed[wordTarget[i]]?wordTarget[i]:'_')+' ';
    }
    document.getElementById('wordDisplay').textContent=display;
    playMatch();
    if(display.indexOf('_')===-1){
      updateScore(20);showWinMessage('إجابة صحيحة! 🎉');
    }
  }else{
    btn.classList.add('wrong');wordLives--;
    var hearts='';for(var h=0;h<Math.max(0,wordLives);h++)hearts+='❤️';
    document.getElementById('wordLives').textContent=hearts;
    if(wordLives<=0){
      document.getElementById('wordDisplay').textContent=wordTarget;
      showLoseMessage('انتهت المحاولات!');
    }
  }
}

// ===== 5. MAZE (Improved Controls) =====
var mazeGrid,mazePlayer,mazeGoal,mazeSize;
function initMaze(){
  mazeSize=11;mazeGrid=generateMaze(mazeSize);
  mazePlayer={x:1,y:1};mazeGoal={x:mazeSize-2,y:mazeSize-2};
  document.getElementById('gameBody').innerHTML=
    '<div class="game-status">🏰 أوصل البطل إلى العلم</div><div class="maze-board" id="mazeBoard" style="grid-template-columns:repeat('+mazeSize+',25px)"></div><div class="maze-controls"><div></div><button class="maze-btn" onclick="moveMaze(0,-1)">⬆️</button><div></div><button class="maze-btn" onclick="moveMaze(-1,0)">➡️</button><button class="maze-btn" onclick="moveMaze(0,1)">⬇️</button><button class="maze-btn" onclick="moveMaze(1,0)">⬅️</button></div>';
  renderMaze();
  document.onkeydown=function(e){
    if(currentGame!=='maze')return;
    switch(e.key){case 'ArrowUp':moveMaze(0,-1);break;case 'ArrowDown':moveMaze(0,1);break;case 'ArrowLeft':moveMaze(1,0);break;case 'ArrowRight':moveMaze(-1,0);break}
  };
}
function generateMaze(size){
  var grid=[];for(var y=0;y<size;y++){grid[y]=[];for(var x=0;x<size;x++)grid[y][x]=1}
  function carve(x,y){
    grid[y][x]=0;
    var dirs=[[0,-2],[0,2],[-2,0],[2,0]];
    dirs.sort(function(){return Math.random()-0.5});
    for(var d=0;d<dirs.length;d++){
      var nx=x+dirs[d][0],ny=y+dirs[d][1];
      if(nx>0&&nx<size-1&&ny>0&&ny<size-1&&grid[ny][nx]===1){
        grid[y+dirs[d][1]/2][x+dirs[d][0]/2]=0;carve(nx,ny);
      }
    }
  }
  carve(1,1);
  grid[size-2][size-2]=0;
  return grid;
}
function renderMaze(){
  var board=document.getElementById('mazeBoard');if(!board)return;board.innerHTML='';
  for(var y=0;y<mazeSize;y++){
    for(var x=0;x<mazeSize;x++){
      var cell=document.createElement('div');cell.className='maze-cell';
      if(x===mazePlayer.x&&y===mazePlayer.y)cell.classList.add('player');
      else if(x===mazeGoal.x&&y===mazeGoal.y)cell.classList.add('goal');
      else if(mazeGrid[y][x]===1)cell.classList.add('wall');
      else cell.classList.add('path');
      board.appendChild(cell);
    }
  }
}
function moveMaze(dx,dy){
  var nx=mazePlayer.x+dx,ny=mazePlayer.y+dy;
  if(nx<0||nx>=mazeSize||ny<0||ny>=mazeSize)return;
  if(mazeGrid[ny][nx]===1)return;
  playClick();mazePlayer.x=nx;mazePlayer.y=ny;renderMaze();
  if(nx===mazeGoal.x&&ny===mazeGoal.y){
    updateScore(15);showWinMessage('وصلت بسلام! 🏰');
  }
}

// ===== 6. IMAGE PUZZLE =====
var pzTiles, pzSize, pzImgId;
function initPuzzle(diff){
  pzSize = diff==='easy'?3 : diff==='medium'?4 : 5;
  pzImgId = Math.floor(Math.random()*100); // Random image
  
  // Generate solved state then shuffle
  pzTiles = [];
  var total = pzSize*pzSize;
  for(var i=0; i<total-1; i++) pzTiles.push(i);
  pzTiles.push(-1); // Empty
  
  // Shuffle by making valid moves
  var emptyIdx = total-1;
  for(var s=0; s<150; s++){
    var neighbors = [];
    var r = Math.floor(emptyIdx/pzSize), c = emptyIdx%pzSize;
    if(r>0) neighbors.push(emptyIdx-pzSize);
    if(r<pzSize-1) neighbors.push(emptyIdx+pzSize);
    if(c>0) neighbors.push(emptyIdx-1);
    if(c<pzSize-1) neighbors.push(emptyIdx+1);
    var rand = neighbors[Math.floor(Math.random()*neighbors.length)];
    pzTiles[emptyIdx] = pzTiles[rand];
    pzTiles[rand] = -1;
    emptyIdx = rand;
  }
  
  var imgUrl = 'https://picsum.photos/id/'+pzImgId+'/300/300';
  
  document.getElementById('gameBody').innerHTML=
    '<div class="game-status">🧩 رتب الصورة</div>'+
    '<img src="'+imgUrl+'" class="puzzle-preview">'+
    '<div class="puzzle-board" id="puzzleBoard" style="grid-template-columns:repeat('+pzSize+',1fr);width:'+ (pzSize*60) +'px;height:'+ (pzSize*60) +'px"></div>';
    
  renderPuzzle(imgUrl);
}
function renderPuzzle(url){
  var board=document.getElementById('puzzleBoard');board.innerHTML='';
  var sz = board.offsetWidth / pzSize;
  
  pzTiles.forEach(function(val, i){
    var tile=document.createElement('div');
    tile.className='puzzle-piece'+(val===-1?' empty':'');
    if(val !== -1){
      // Calculate original position for background
      var origR = Math.floor(val/pzSize), origC = val%pzSize;
      tile.style.backgroundImage = 'url('+url+')';
      tile.style.backgroundSize = (pzSize*100)+'%';
      tile.style.backgroundPosition = (origC * 100/(pzSize-1))+'% '+(origR * 100/(pzSize-1))+'%';
      tile.onclick = function(){movePuzzle(i)};
    }
    board.appendChild(tile);
  });
}
function movePuzzle(idx){
  var ei=pzTiles.indexOf(-1);
  var r=Math.floor(idx/pzSize),c=idx%pzSize;
  var er=Math.floor(ei/pzSize),ec=ei%pzSize;
  if(Math.abs(r-er)+Math.abs(c-ec)===1){
    playClick();
    var tmp=pzTiles[idx];pzTiles[idx]=pzTiles[ei];pzTiles[ei]=tmp;
    renderPuzzle('https://picsum.photos/id/'+pzImgId+'/300/300');
    
    // Check win
    var win=true;
    for(var k=0;k<pzTiles.length-1;k++){if(pzTiles[k]!==k){win=false;break}}
    if(win){updateScore(50);showWinMessage('صورة مكتملة! 🖼️')}
  }
}
