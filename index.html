<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Hub Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #fff; --gray: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        .app-container { max-width: 450px; margin: auto; }
        
        /* Header Style */
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--gray); margin-bottom: 20px; }
        .header h1 { font-size: 1.4rem; letter-spacing: 3px; margin: 0; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: var(--panel); border: 1px solid var(--gray); text-align: center; cursor: pointer; font-size: 0.9rem; }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        
        /* Forms */
        .form-section { background: var(--panel); padding: 20px; border-radius: 4px; border: 1px solid #222; display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s ease; }
        
        label { display: block; font-size: 0.75rem; color: #777; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gray); color: #fff; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-skip { width: 100%; padding: 10px; background: transparent; color: #777; border: 1px solid var(--gray); margin-top: 10px; cursor: pointer; }
        
        /* Admin Hidden */
        .admin-trigger { margin-top: 40px; color: #111; font-size: 0.5rem; border: none; background: none; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>PRO_HUB v2</h1>
    </div>

    <div class="tabs">
        <div class="tab active" id="tabOld" onclick="switchTab('old')">بيع قديم</div>
        <div class="tab" id="tabNew" onclick="switchTab('new')">إنشاء جديد</div>
    </div>

    <!-- فورم القديم -->
    <div id="sectionOld" class="form-section active">
        <label>إيميل جوجل القديم</label>
        <input type="text" id="old_email" placeholder="example@gmail.com">
        <label>كلمة المرور</label>
        <input type="password" id="old_pass" placeholder="******">
        <button class="btn-main" onclick="send('قديم')">تأكيد البيع</button>
    </div>

    <!-- فورم الجديد (مع جلب المعلومات) -->
    <div id="sectionNew" class="form-section">
        <div id="fetchArea">
            <p style="font-size: 0.85rem; color: #aaa;">سيتم جلب بيانات الإيميل من البوت المخصص تلقائياً.</p>
            <button class="btn-main" onclick="requestAutoData()">جلب البيانات آلياً</button>
        </div>
        
        <div id="manualArea" style="display:none; margin-top: 15px;">
            <label>الإيميل الجديد</label>
            <input type="text" id="new_email" readonly style="background: #111; color: #55ff55;">
            <label>كلمة المرور</label>
            <input type="text" id="new_pass" readonly style="background: #111;">
            <button class="btn-main" onclick="send('جديد')">حفظ الإيميل</button>
            <button class="btn-skip" onclick="requestAutoData()">تخطي وجلب غيره</button>
        </div>
    </div>

    <button class="admin-trigger" onclick="openAdmin()">ADMIN_LOGS</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let currentMode = 'old';

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        
        if(mode === 'old') {
            document.getElementById('tabOld').classList.add('active');
            document.getElementById('sectionOld').classList.add('active');
        } else {
            document.getElementById('tabNew').classList.add('active');
            document.getElementById('sectionNew').classList.add('active');
        }
    }

    // طلب البيانات من البوت
    function requestAutoData() {
        tg.sendData(JSON.stringify({ action: "get_new_email" }));
        // هنا الموقع ينتظر رسالة من البوت لتحديث الحقول (سنقوم بتنفيذها في البوت)
    }

    function send(type) {
        let e = type === 'قديم' ? document.getElementById('old_email').value : document.getElementById('new_email').value;
        let p = type === 'قديم' ? document.getElementById('old_pass').value : document.getElementById('new_pass').value;
        
        if(!e || !p) { alert("البيانات غير مكتملة"); return; }
        
        tg.sendData(JSON.stringify({ type: type, email: e, pass: p }));
        
        // مسح الحقول بعد الإرسال
        if(type === 'قديم') { 
            document.getElementById('old_email').value = ''; 
            document.getElementById('old_pass').value = ''; 
        }
        alert("تم الإرسال بنجاح!");
    }

    function openAdmin() {
        if(prompt("Code:") === "727") {
            // كود عرض الأرشيف كما في الرد السابق
        }
    }
</script>
</body>
</html>
