<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎮 GameZone - عالم الألعاب</title>
<style>
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-card: #1a1a3e;
  --text-primary: #ffffff;
  --text-secondary: #a0a0cc;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --accent3: #fd79a8;
  --accent4: #fdcb6e;
  --accent5: #55efc4;
  --gradient1: linear-gradient(135deg, #6c5ce7, #a29bfe);
  --gradient2: linear-gradient(135deg, #00cec9, #81ecec);
  --gradient3: linear-gradient(135deg, #fd79a8, #fab1a0);
  --gradient4: linear-gradient(135deg, #fdcb6e, #f39c12);
  --gradient5: linear-gradient(135deg, #55efc4, #00b894);
  --shadow: 0 10px 40px rgba(0,0,0,0.4);
  --shadow-hover: 0 20px 60px rgba(108,92,231,0.3);
  --radius: 20px;
  --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f0f0ff;
    --bg-secondary: #e8e8f8;
    --bg-card: #ffffff;
    --text-primary: #1a1a3e;
    --text-secondary: #6666aa;
    --shadow: 0 10px 40px rgba(108,92,231,0.15);
    --shadow-hover: 0 20px 60px rgba(108,92,231,0.25);
  }
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s;
}

.bg-animation {
  position: fixed; top:0; left:0; width:100%; height:100%;
  z-index: 0; overflow: hidden; pointer-events: none;
}
.bg-animation .orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  opacity: 0.3; animation: floatOrb 20s infinite ease-in-out;
}
.orb:nth-child(1) { width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation-delay:0s; }
.orb:nth-child(2) { width:300px;height:300px;background:var(--accent2);top:50%;right:-50px;animation-delay:-5s; }
.orb:nth-child(3) { width:350px;height:350px;background:var(--accent3);bottom:-100px;left:30%;animation-delay:-10s; }
.orb:nth-child(4) { width:250px;height:250px;background:var(--accent4);top:30%;left:50%;animation-delay:-15s; }

@keyframes floatOrb {
  0%,100% { transform:translate(0,0) scale(1); }
  25% { transform:translate(100px,-50px) scale(1.1); }
  50% { transform:translate(-50px,100px) scale(0.9); }
  75% { transform:translate(80px,50px) scale(1.05); }
}

.container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:20px; }

.hero { text-align:center; padding:40px 0 30px; animation:fadeInDown 1s ease; }
.hero-logo {
  font-size:clamp(2.5rem,8vw,4.5rem); font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:10px; letter-spacing:-1px;
}
.hero-logo .emoji { -webkit-text-fill-color:initial; animation:bounce 2s infinite; display:inline-block; }
.hero-subtitle { color:var(--text-secondary); font-size:clamp(0.9rem,2.5vw,1.2rem); font-weight:300; letter-spacing:2px; }
.stats-bar { display:flex; justify-content:center; gap:20px; margin-top:20px; flex-wrap:wrap; }
.stat-item {
  background:var(--bg-card); padding:10px 20px; border-radius:50px;
  font-size:0.85rem; color:var(--text-secondary); backdrop-filter:blur(10px);
  border:1px solid rgba(108,92,231,0.2);
}
.stat-item span { color:var(--accent2); font-weight:700; }

@keyframes fadeInDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.section-title { font-size:1.5rem; font-weight:700; margin:30px 0 20px; display:flex; align-items:center; gap:10px; }
.section-title::before { content:''; width:4px; height:30px; background:var(--gradient1); border-radius:2px; }

.games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; padding-bottom:40px; }
.game-card {
  background:var(--bg-card); border-radius:var(--radius); overflow:hidden; cursor:pointer;
  transition:var(--transition); border:1px solid rgba(108,92,231,0.1);
  position:relative; animation:fadeInUp 0.6s ease backwards;
}
.game-card:nth-child(1){animation-delay:.1s} .game-card:nth-child(2){animation-delay:.2s}
.game-card:nth-child(3){animation-delay:.3s} .game-card:nth-child(4){animation-delay:.4s}
.game-card:nth-child(5){animation-delay:.5s} .game-card:nth-child(6){animation-delay:.6s}

@keyframes fadeInUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
.game-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:var(--shadow-hover); border-color:rgba(108,92,231,0.4); }
.game-card:active { transform:translateY(-4px) scale(0.98); }

.card-image {
  height:160px; display:flex; align-items:center; justify-content:center;
  font-size:4rem; position:relative; overflow:hidden;
}
.card-image::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:50%;
  background:linear-gradient(transparent,var(--bg-card));
}
.card-image .game-icon { z-index:1; transition:var(--transition); filter:drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
.game-card:hover .game-icon { transform:scale(1.2) rotate(5deg); }

.card-body { padding:15px 20px 20px; }
.card-body h3 { font-size:1.15rem; font-weight:700; margin-bottom:5px; }
.card-body p { font-size:0.8rem; color:var(--text-secondary); margin-bottom:12px; line-height:1.5; }
.card-footer { display:flex; justify-content:space-between; align-items:center; }
.card-level { font-size:0.75rem; padding:4px 12px; border-radius:50px; background:rgba(108,92,231,0.15); color:var(--accent); font-weight:600; }
.card-score { font-size:0.75rem; color:var(--accent4); font-weight:600; }

/* ===== GAME MODAL ===== */
.game-modal {
  position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000;
  display:none; align-items:center; justify-content:center;
  background:rgba(10,10,26,0.95); backdrop-filter:blur(20px); padding:15px;
  animation:fadeIn .3s ease;
}
.game-modal.active { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.game-container {
  background:var(--bg-secondary); border-radius:var(--radius);
  width:100%; max-width:600px; max-height:90vh; overflow-y:auto;
  position:relative; animation:slideUp .4s cubic-bezier(.175,.885,.32,1.275);
  border:1px solid rgba(108,92,231,0.2);
}
@keyframes slideUp { from{opacity:0;transform:translateY(50px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

.game-header {
  padding:20px; display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid rgba(108,92,231,0.15); position:sticky; top:0;
  background:var(--bg-secondary); z-index:10; border-radius:var(--radius) var(--radius) 0 0;
}
.game-header h2 { font-size:1.2rem; display:flex; align-items:center; gap:8px; }
.game-info { display:flex; gap:15px; font-size:0.85rem; }
.game-info span { color:var(--accent4); font-weight:700; }

.close-btn {
  width:40px; height:40px; border-radius:50%; border:none;
  background:rgba(255,255,255,0.1); color:var(--text-primary);
  font-size:1.2rem; cursor:pointer; transition:var(--transition);
  display:flex; align-items:center; justify-content:center;
}
.close-btn:hover { background:rgba(253,121,168,0.3); transform:rotate(90deg); }

.game-body { padding:20px; min-height:300px; display:flex; flex-direction:column; align-items:center; }

/* ===== MODE SELECTOR ===== */
.mode-selector {
  display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px; margin:20px 0;
}
.mode-btn {
  padding:18px 25px; border-radius:15px; border:2px solid rgba(108,92,231,0.3);
  background:var(--bg-card); color:var(--text-primary); font-size:1.1rem;
  font-weight:600; cursor:pointer; transition:var(--transition);
  display:flex; align-items:center; gap:12px;
}
.mode-btn:hover { border-color:var(--accent); background:rgba(108,92,231,0.15); transform:translateY(-3px); }
.mode-btn:active { transform:scale(0.97); }
.mode-btn .mode-icon { font-size:1.8rem; }

.difficulty-selector {
  display:flex; gap:10px; margin:15px 0;
}
.diff-btn {
  padding:10px 20px; border-radius:12px; border:none;
  font-size:0.95rem; font-weight:700; cursor:pointer;
  transition:var(--transition); color:white;
}
.diff-btn.easy { background:linear-gradient(135deg,#55efc4,#00b894); }
.diff-btn.medium { background:linear-gradient(135deg,#fdcb6e,#f39c12); }
.diff-btn.hard { background:linear-gradient(135deg,#fd79a8,#e84393); }
.diff-btn:hover { transform:scale(1.05); }

/* ===== XO ===== */
.xo-board { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:280px; margin:20px 0; }
.xo-cell {
  width:85px; height:85px; background:var(--bg-card); border-radius:15px;
  border:2px solid rgba(108,92,231,0.2); font-size:2.2rem; font-weight:900;
  cursor:pointer; transition:var(--transition); display:flex; align-items:center;
  justify-content:center; color:var(--text-primary);
}
.xo-cell:hover:not(.taken) { border-color:var(--accent); background:rgba(108,92,231,0.1); transform:scale(1.05); }
.xo-cell.x { color:var(--accent); }
.xo-cell.o { color:var(--accent3); }
.xo-cell.win { animation:winPulse .5s ease; border-color:var(--accent4); background:rgba(253,203,110,0.2); }
@keyframes winPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

.game-status { font-size:1.1rem; margin:15px 0; font-weight:600; min-height:30px; text-align:center; }
.play-btn {
  padding:12px 30px; border:none; border-radius:50px; background:var(--gradient1);
  color:white; font-size:1rem; font-weight:700; cursor:pointer;
  transition:var(--transition); margin-top:10px;
}
.play-btn:hover { transform:scale(1.05); box-shadow:0 5px 20px rgba(108,92,231,0.4); }

/* ===== MEMORY ===== */
.memory-board { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; width:300px; margin:20px 0; }
.memory-card {
  width:68px; height:68px; background:var(--bg-card); border-radius:12px;
  border:2px solid rgba(108,92,231,0.2); cursor:pointer;
  transition:var(--transition); display:flex; align-items:center; justify-content:center;
  position:relative; transform-style:preserve-3d;
}
.memory-card-inner {
  width:100%;height:100%;position:relative;transition:transform .6s;transform-style:preserve-3d;
}
.memory-card.flipped .memory-card-inner { transform:rotateY(180deg); }
.memory-card-front,.memory-card-back {
  position:absolute;width:100%;height:100%;backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;border-radius:12px;
}
.memory-card-front {
  background:var(--gradient1);font-size:1.8rem;transform:rotateY(180deg);
}
.memory-card-back {
  background:var(--bg-card);font-size:1.5rem;color:var(--accent);
  border:2px solid rgba(108,92,231,0.2);
}
.memory-card.matched { border-color:var(--accent5); }
.memory-card.matched .memory-card-front { background:var(--gradient5); }

/* ===== CLICK SPEED ===== */
.click-area {
  width:250px; height:250px; border-radius:50%; background:var(--gradient1);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:var(--transition); margin:20px 0; position:relative; user-select:none;
}
.click-area:hover { transform:scale(1.05); box-shadow:0 0 40px rgba(108,92,231,0.4); }
.click-area:active { transform:scale(0.95); }
.click-area.p2 { background:var(--gradient3); }
.click-area .click-text { color:white; font-size:1.3rem; font-weight:700; text-align:center; pointer-events:none; }
.click-area .click-count { font-size:3rem; display:block; margin-top:5px; }
.click-ripple {
  position:absolute; border-radius:50%; background:rgba(255,255,255,0.3);
  animation:ripple .6s ease-out; pointer-events:none;
}
@keyframes ripple { from{width:0;height:0;opacity:1} to{width:200px;height:200px;opacity:0;margin:-100px} }

.click-arena { display:flex; gap:20px; align-items:center; flex-wrap:wrap; justify-content:center; }
.vs-badge {
  font-size:1.5rem; font-weight:900; color:var(--accent4);
  animation:bounce 1s infinite;
}

/* ===== WORD GUESS ===== */
.word-display { font-size:2.5rem; letter-spacing:15px; margin:20px 0; font-weight:700; color:var(--accent2); }
.word-hint { color:var(--accent4); font-size:1rem; margin-bottom:15px; text-align:center; padding:10px 20px; background:rgba(253,203,110,0.1); border-radius:12px; border:1px solid rgba(253,203,110,0.2); }
.ar-keyboard { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:400px; margin:10px 0; }
.ar-letter-btn {
  width:42px; height:42px; border-radius:10px; border:1px solid rgba(108,92,231,0.2);
  background:var(--bg-card); color:var(--text-primary); font-size:1rem;
  font-weight:600; cursor:pointer; transition:var(--transition);
}
.ar-letter-btn:hover:not(:disabled) { background:var(--accent); border-color:var(--accent); transform:scale(1.1); }
.ar-letter-btn:disabled { opacity:0.3; cursor:not-allowed; }
.ar-letter-btn.correct { background:var(--accent5); border-color:var(--accent5); color:#000; }
.ar-letter-btn.wrong { background:var(--accent3); border-color:var(--accent3); }
.hangman-lives { font-size:1.5rem; margin:10px 0; }

/* ===== MAZE ===== */
.maze-board { display:grid; gap:1px; margin:15px 0; background:rgba(108,92,231,0.1); padding:8px; border-radius:15px; }
.maze-cell { width:35px; height:35px; border-radius:6px; transition:all .3s ease; }
.maze-cell.wall { background:var(--bg-card); border-radius:4px; }
.maze-cell.path { background:rgba(108,92,231,0.05); }
.maze-cell.player { 
  background:transparent; display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; animation:playerBounce .5s ease;
}
.maze-cell.goal {
  background:rgba(253,203,110,0.15); display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; animation:goalPulse 1.5s infinite;
}
.maze-cell.visited { background:rgba(108,92,231,0.1); }
@keyframes playerBounce { 0%{transform:scale(0.5)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
@keyframes goalPulse { 0%,100%{transform:scale(.8);opacity:.6} 50%{transform:scale(1.1);opacity:1} }
.maze-controls {
  display:grid; grid-template-columns:repeat(3,55px); grid-template-rows:repeat(2,55px);
  gap:6px; margin-top:10px;
}
.maze-btn {
  width:55px; height:55px; border-radius:14px; border:none;
  background:var(--bg-card); color:var(--text-primary); font-size:1.4rem;
  cursor:pointer; transition:var(--transition); display:flex; align-items:center; justify-content:center;
}
.maze-btn:hover { background:var(--accent); transform:scale(1.1); }
.maze-btn:active { transform:scale(0.9); }

/* ===== PUZZLE (PICTURE) ===== */
.puzzle-board { display:grid; gap:4px; margin:15px 0; border-radius:15px; overflow:hidden; }
.puzzle-tile {
  cursor:pointer; transition:var(--transition); border:2px solid rgba(108,92,231,0.3);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:2rem; overflow:hidden; position:relative;
}
.puzzle-tile:hover:not(.empty) { transform:scale(0.95); border-color:var(--accent); }
.puzzle-tile.empty { background:var(--bg-primary); border-color:transparent; cursor:default; }
.puzzle-tile .tile-pattern {
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:inherit;
}
.puzzle-preview {
  width:120px;height:120px;border-radius:12px;margin:10px 0;
  border:2px solid rgba(108,92,231,0.3);overflow:hidden;
}

/* ===== SCORE MODAL ===== */
.score-modal { text-align:center; padding:30px; }
.score-modal .big-emoji { font-size:4rem; margin-bottom:15px; animation:bounce 1s infinite; }
.score-modal h2 { font-size:1.5rem; margin-bottom:10px; }
.score-modal .score-value {
  font-size:2.5rem; font-weight:900;
  background:linear-gradient(135deg,var(--accent4),var(--accent3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin:10px 0;
}
.score-modal .best-score { color:var(--accent2); font-size:0.9rem; margin-bottom:20px; }

/* ===== AD SPACE ===== */
.ad-space {
  width:100%; margin:20px 0; padding:20px;
  border-radius:12px; border:2px dashed rgba(108,92,231,0.2);
  background:rgba(108,92,231,0.05);
  text-align:center; color:var(--text-secondary);
  font-size:0.8rem; min-height:80px;
  display:flex; align-items:center; justify-content:center;
}
.ad-space::before { content:'📢 مساحة إعلانية'; font-size:0.85rem; opacity:0.6; }

.ad-space-banner {
  width:100%; margin:15px 0; padding:15px;
  border-radius:10px; border:1px dashed rgba(108,92,231,0.15);
  background:rgba(108,92,231,0.03);
  text-align:center; min-height:60px;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-secondary); font-size:0.75rem;
}
.ad-space-banner::before { content:'📢 إعلان'; opacity:0.5; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:3px; }

/* ===== RESPONSIVE ===== */
@media(max-width:600px) {
  .games-grid { grid-template-columns:1fr; }
  .game-card { display:flex; flex-direction:row; align-items:center; }
  .card-image { width:100px; height:100px; flex-shrink:0; border-radius:var(--radius) 0 0 var(--radius); }
  .card-image::after { background:linear-gradient(to right,transparent,var(--bg-card)); width:50%; height:100%; }
  .card-body { flex:1; padding:15px; }
  .xo-board { width:240px; }
  .xo-cell { width:72px; height:72px; font-size:1.8rem; }
  .memory-board { width:260px; }
  .memory-card { width:58px; height:58px; }
  .click-area { width:200px; height:200px; }
  .maze-cell { width:28px; height:28px; }
}
@media(min-width:601px) and (max-width:900px) { .games-grid { grid-template-columns:repeat(2,1fr); } }

.particle {
  position:fixed; pointer-events:none; z-index:9999;
  animation:particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}
}

.loading-screen {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:var(--bg-primary); z-index:10000;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  transition:opacity .5s;
}
.loading-screen.hidden { opacity:0; pointer-events:none; }
.loader {
  width:60px; height:60px; border:4px solid rgba(108,92,231,0.2);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite; margin-bottom:20px;
}
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color:var(--text-secondary); font-size:0.9rem; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div class="loading-text">جاري تحميل الألعاب...</div>
</div>

<div class="bg-animation">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<div class="container">
  <div class="hero">
    <div class="hero-logo"><span class="emoji">🎮</span> GameZone</div>
    <p class="hero-subtitle">عالم الألعاب بين يديك</p>
    <div class="stats-bar">
      <div class="stat-item">🎮 الألعاب: <span>6</span></div>
      <div class="stat-item">⭐ أفضل نتيجة: <span id="totalBest">0</span></div>
    </div>
  </div>

  <div class="section-title">🕹️ اختر لعبتك</div>
  <div class="games-grid" id="gamesGrid"></div>

  <div class="ad-space"></div>
</div>

<div class="game-modal" id="gameModal">
  <div class="game-container">
    <div class="game-header">
      <h2 id="gameTitle"></h2>
      <div class="game-info">
        <div>⭐ النقاط: <span id="gameScore">0</span></div>
        <div>🏆 الأفضل: <span id="gameBest">0</span></div>
      </div>
      <button class="close-btn" onclick="closeGame()">✕</button>
    </div>
    <div class="game-body" id="gameBody"></div>
  </div>
</div>

<script>
var audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(freq,dur,type,vol){
  try{initAudio();var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function playClick(){playSound(800,0.1,'sine',0.1)}
function playWin(){playSound(523,0.15,'sine',0.12);setTimeout(function(){playSound(659,0.15,'sine',0.12)},100);setTimeout(function(){playSound(784,0.3,'sine',0.12)},200)}
function playLose(){playSound(200,0.4,'sawtooth',0.08)}
function playMatch(){playSound(600,0.1,'sine',0.1);setTimeout(function(){playSound(900,0.15,'sine',0.1)},80)}
function playFlip(){playSound(400,0.08,'sine',0.08)}

function spawnParticles(x,y,count,colors){
  count=count||8;colors=colors||['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#55efc4'];
  for(var i=0;i<count;i++){
    var p=document.createElement('div');p.className='particle';
    p.style.left=x+'px';p.style.top=y+'px';
    var s=Math.random()*10+5;p.style.width=s+'px';p.style.height=s+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius='50%';
    p.style.setProperty('--tx',(Math.random()-0.5)*200+'px');
    p.style.setProperty('--ty',(Math.random()-0.5)*200+'px');
    document.body.appendChild(p);(function(el){setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},1000)})(p);
  }
}

function renderCards(){
  var g=document.getElementById('gamesGrid');g.innerHTML='';
  games.forEach(function(gr,i){
    var best=getScore(gr.id);
    var c=document.createElement('div');c.className='game-card';
    c.style.animationDelay=(i*0.1)+'s';
    c.onclick=function(){openGame(gr.id)};
    c.innerHTML='<div class="card-image" style="background:'+gr.gradient+'"><span class="game-icon">'+gr.icon+'</span></div><div class="card-body"><h3>'+gr.name+'</h3><p>'+gr.desc+'</p><div class="card-footer"><span class="card-score">🏆 '+best+'</span></div></div>';
    g.appendChild(c);
  });

function openGame(id){
  playClick();currentGame=id;score=0;currentMode=null;currentDiff=null;
  var g=games.find(function(x){return x.id===id});
  document.getElementById('gameTitle').innerHTML=g.icon+' '+g.name;
  document.getElementById('gameScore').textContent=0;
  document.getElementById('gameBest').textContent=getScore(id);
  document.getElementById('gameModal').classList.add('active');

var xoBoard,xoTurn,xoGameOver,xoAI;
function initXO(){
  xoBoard=['','','','','','','','',''];xoTurn='X';xoGameOver=false;
  xoAI=currentDiff;
  var label=currentMode==='friend'?'👥 ضد صديق':'🤖 AI: '+(xoAI==='easy'?'سهل':xoAI==='medium'?'متوسط':'صعب');
  document.getElementById('gameBody').innerHTML=
    '<div class="game-status" id="xoStatus">'+label+' | دور ❌</div><div class="xo-board" id="xoBoard"></div>';
  var b=document.getElementById('xoBoard');
  for(var i=0;i<9;i++){
    var c=document.createElement('div');c.className='xo-cell';
    (function(idx){c.onclick=function(){xoMove(idx)}})(i);
    b.appendChild(c);
  }
}
function xoMove(i){
  if(xoBoard[i]||xoGameOver||xoTurn!=='X')return;
  playClick();xoBoard[i]='X';
  var cells=document.querySelectorAll('.xo-cell');
  cells[i].textContent='❌';cells[i].classList.add('taken','x');
  if(checkXOWin('X')){xoGameOver=true;updateScore(15);showWinMessage('فزت! 🎉');return}
  if(xoBoard.every(function(c){return c!==' '})){xoGameOver=true;showLoseMessage('تعادل! 🤝');return}
  if(currentMode==='friend'){
    xoTurn='O';document.getElementById('xoStatus').textContent='دور ⭕';
  }else{
    xoTurn='O';document.getElementById('xoStatus').textContent='دور الذكاء الاصطناعي...';
    _gt=setTimeout(xoAI_Move,400);
  }
}
function xoFriendMove(i){
  if(xoBoard[i]||xoGameOver)return;
  playClick();xoBoard[i]='O';
  var cells=document.querySelectorAll('.xo-cell');
  cells[i].textContent='⭕';cells[i].classList.add('taken','o');
  if(checkXOWin('O')){xoGameOver=true;updateScore(0);showLoseMessage('صديقك فاز! 😅');return}
  if(xoBoard.every(function(c){return c!==' '})){xoGameOver=true;showLoseMessage('تعادل! 🤝');return}
  xoTurn='X';document.getElementById('xoStatus').textContent='دور ❌';
}
function xoAI_Move(){
  var move;
  if(xoAI==='easy'){
    var a=[];for(var i=0;i<9;i++)if(xoBoard[i]==='')a.push(i);
    move=a[Math.floor(Math.random()*a.length)];
  }else{
    for(var i=0;i<9;i++){if(xoBoard[i]===''){xoBoard[i]='O';if(checkXOWin('O')){xoBoard[i]='';move=i;break}xoBoard[i]=''}}
    if(move===undefined){
      for(var i=0;i<9;i++){if(xoBoard[i]===''){xoBoard[i]='X';if(checkXOWin('X')){xoBoard[i]='';move=i;break}xoBoard[i]=''}}
    }
    if(move===undefined){
      if(xoBoard[4]==='')move=4;
      else{var corners=[0,2,6,8].filter(function(i){return xoBoard[i]===''});
        if(corners.length)move=corners[Math.floor(Math.random()*corners.length)];
        else{var a=[];for(var i=0;i<9;i++)if(xoBoard[i]==='')a.push(i);move=a[Math.floor(Math.random()*a.length)]}
      }
    }
  }
  xoBoard[move]='O';
  var cells=document.querySelectorAll('.xo-cell');
  cells[move].textContent='⭕';cells[move].classList.add('taken','o');
  if(checkXOWin('O')){xoGameOver=true;showLoseMessage('الذكاء الاصطناعي فاز! 🤖');return}
  if(xoBoard.every(function(c){return c!==' '})){xoGameOver=true;showLoseMessage('تعادل! 🤝');return}
  xoTurn='X';document.getElementById('xoStatus').textContent='دورك! أنت ❌';
}
function checkXOWin(m){
  var w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  var cells=document.querySelectorAll('.xo-cell');
  for(var i=0;i<w.length;i++){
    if(xoBoard[w[i][0]]===m&&xoBoard[w[i][1]]===m&&xoBoard[w[i][2]]===m){
      cells[w[i][0]].classList.add('win');cells[w[i][1]].classList.add('win');cells[w[i][2]].classList.add('win');
      return true;
    }
  }return false;
}

// ===== 2. MEMORY GAME (IMPROVED) =====
var memFlipped,memMatched,memLocked,memTimer,memSeconds,memPairs;
function initMemory(){
  var emojis=['🍎','🍊','🍋','🍇','🍓','🫐','🍑','🥝','🍌','🍒','🥭','🍍','🥥','🍈','🍐','🍏','🫒','🥑','🌶️','🌽','🥕','🧄','🧅','🥔'];
  var pairs=Math.min(4+Math.floor(Math.random()*4),8);
  var cols=4;var total=pairs*2;
  var selected=emojis.slice(0,pairs);
  var deck=selected.concat(selected);
  deck.sort(function(){return Math.random()-0.5});
  memFlipped=[];memMatched=0;memLocked=false;memSeconds=0;memPairs=pairs;

  document.getElementById('gameBody').innerHTML=
    '<div class="game-status">⏱️ <span id="memTimer">00:00</span> | الأزواج: <span id="memPairsLeft">'+pairs+'</span></div>'+
    '<div class="memory-board" id="memoryBoard" style="grid-template-columns:repeat('+cols+',1fr)"></div>';
  var board=document.getElementById('memoryBoard');
  board.style.width=(cols*78)+'px';
  deck.forEach(function(emoji,i){
    var c=document.createElement('div');c.className='memory-card';
    c.dataset.emoji=emoji;
    c.innerHTML='<div class="memory-card-inner"><div class="memory-card-front">'+emoji+'</div><div class="memory-card-back">❓</div></div>';
    c.onclick=function(){flipMemoryCard(c)};
    board.appendChild(c);
  });
  _gi=setInterval(function(){
    memSeconds++;
    var m=Math.floor(memSeconds/60);var s=memSeconds%60;
    var el=document.getElementById('memTimer');
    if(el)el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  },1000);
}
function flipMemoryCard(card){
  if(memLocked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  playFlip();card.classList.add('flipped');memFlipped.push(card);
  if(memFlipped.length===2){
    memLocked=true;
    var a=memFlipped[0],b=memFlipped[1];
    if(a.dataset.emoji===b.dataset.emoji){
      playMatch();a.classList.add('matched');b.classList.add('matched');memMatched++;
      var el=document.getElementById('memPairsLeft');if(el)el.textContent=memPairs-memMatched;
      memFlipped=[];memLocked=false;
      if(memMatched>=memPairs){
        clearInterval(_gi);
        var points=Math.max(5,(30-memSeconds))*2;
        updateScore(points);
        _gt=setTimeout(function(){showWinMessage('أحسنت! ذاكرتك قوية! 🧠 في '+memSeconds+' ثانية')},500);
      }
    }else{
      _gt=setTimeout(function(){
        a.classList.remove('flipped');b.classList.remove('flipped');
        memFlipped=[];memLocked=false;
      },800);
    }
  }
}

function friendClick(player){
  if(clickTimeLeft<=0)return;
  if(!clickActive){
    clickActive=true;
    _gi=setInterval(function(){
      clickTimeLeft--;
      var el=document.getElementById('clickTimer');if(el)el.textContent='⏱️ '+clickTimeLeft+' ثوانٍ';
      if(clickTimeLeft<=0){
        clearInterval(_gi);clickActive=false;
        var p1=clickP1,p2=clickP2;
        updateScore(Math.max(p1,p2)*2);
        if(p1>p2)showWinMessage('اللاعب 1 فاز! '+p1+' vs '+p2+' 🎉');
        else if(p2>p1)showLoseMessage('اللاعب 2 فاز! '+p2+' vs '+p1);
        else showLoseMessage('تعادل! '+p1+' vs '+p2);
      }
    },1000);
  }
  playClick();
  if(player===1)clickP1++;else clickP2++;
  var el=document.getElementById('clickP'+player);if(el)el.textContent=player===1?clickP1:clickP2;
  spawnParticles(event.clientX,event.clientY,3);
}
function handleGameClick(e){
  if(!clickActive&&clickTimeLeft===10){
    clickActive=true;
    _gi=setInterval(function(){
      clickTimeLeft--;
      var el=document.getElementById('clickTimer');if(el)el.textContent='⏱️ '+clickTimeLeft+' ثوانٍ';
      if(clickTimeLeft<=0){
        clearInterval(_gi);clickActive=false;
        var target=parseInt(document.getElementById('aiCount').parentElement.textContent.split('/')[1])||50;
        var aiTotal=parseInt(document.getElementById('aiCount').textContent);
        if(clickCount>aiTotal){updateScore(clickCount*2);showWinMessage('فزت! '+clickCount+' vs '+aiTotal+' ⚡')}
        else{updateScore(0);showLoseMessage('الذكاء الاصطناعي فاز! '+aiTotal+' vs '+clickCount)}
      }
    },1000);
  }
  if(!clickActive)return;
  clickCount++;
  var el=document.getElementById('clickCount');if(el)el.textContent=clickCount;
  playClick();
  var area=document.getElementById('clickArea');
  var ripple=document.createElement('div');ripple.className='click-ripple';

  area.appendChild(ripple);(function(r){setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r)},600)})(ripple);
  spawnParticles(e.clientX,e.clientY,3);
}

var arabicLetters='ابتثجحخدذرزسشصضطظعغفقكلمنهوي';

function initWordGuess(){
  var wObj=arabicWords[Math.floor(Math.random()*arabicWords.length)];
  wordTarget=wObj.word;wordGuessed={};wordLives=6+3;wordLength=wordTarget.length;
  var display='';for(var i=0;i<wordLength;i++)display+=' _ ';
  var hearts='';for(var h=0;h<wordLives;h++)hearts+='❤️';

  document.getElementById('gameBody').innerHTML=
    '<div class="game-status" id="wordStatus">خمن الكلمة!</div>'+
    '<div class="word-hint">💡 تلميح: '+wObj.hint+'</div>'+
    '<div class="word-display" id="wordDisplay">'+display+'</div>'+
    '<div class="hangman-lives" id="wordLives">'+hearts+'</div>'+
    '<div class="ar-keyboard" id="arKeyboard"></div>';

  var kb=document.getElementById('arKeyboard');
  for(var i=0;i<arabicLetters.length;i++){
    (function(l){
      var btn=document.createElement('button');btn.className='ar-letter-btn';btn.textContent=l;
      btn.onclick=function(){guessArabicLetter(l,btn)};kb.appendChild(btn);
    })(arabicLetters[i]);
  }
}
function guessArabicLetter(letter,btn){
  btn.disabled=true;playClick();
  if(wordTarget.indexOf(letter)!==-1){
    btn.classList.add('correct');wordGuessed[letter]=true;
    var display='';
    for(var i=0;i<wordTarget.length;i++){
      display+=' '+ (wordGuessed[wordTarget[i]]?wordTarget[i]:'_')+' ';
    }
    document.getElementById('wordDisplay').textContent=display;
    playMatch();
    if(display.indexOf('_')===-1){
      updateScore((10+wordLives*2)*2);showWinMessage('أحسنت! خمنت الكلمة! 🎉');
    }
  }else{
    btn.classList.add('wrong');wordLives--;
    var hearts='';for(var h=0;h<Math.max(0,wordLives);h++)hearts+='❤️';
    var empty=9-Math.max(0,wordLives);for(var e2=0;e2<empty;e2++)hearts+='🖤';
    document.getElementById('wordLives').textContent=hearts;
    if(wordLives<=0){
      document.getElementById('wordStatus').textContent='الكلمة كانت: '+wordTarget;
      showLoseMessage('انتهت المحاولات!');
    }
  }
}

// ===== 5. MAZE (IMPROVED) =====
var mazeGrid,mazePlayer,mazeGoal,mazeSize,mazeVisited,mazeSteps;
function initMaze(){
  mazeSize=Math.min(5+currentDiff*2,13);mazeSteps=0;
  mazeGrid=generateMaze(mazeSize);
  mazePlayer={x:0,y:0};mazeGoal={x:mazeSize-1,y:mazeSize-1};
  mazeVisited=[[0,0]];

  var b=document.getElementById('gameBody');
  b.innerHTML=
    '<div class="game-status">🏰 أوصل اللاعب 🧑‍🚀 إلى الهدف 🌟</div>'+
    '<div class="maze-board" id="mazeBoard" style="grid-template-columns:repeat('+mazeSize+',35px)"></div>'+
    '<div class="maze-controls"><div></div><button class="maze-btn" onclick="moveMaze(0,-1)">⬆️</button><div></div><button class="maze-btn" onclick="moveMaze(1,0)">➡️</button><button class="maze-btn" onclick="moveMaze(0,1)">⬇️</button><button class="maze-btn" onclick="moveMaze(-1,0)">⬅️</button></div>'+
    '<div style="color:var(--text-secondary);font-size:0.8rem;margin-top:8px">الخطوات: <span id="mazeSteps">0</span> | أو استخدم أسهم لوحة المفاتيح / السحب على الشاشة</div>';
  renderMaze();
  document.onkeydown=function(e){
    if(currentGame!=='maze')return;
    switch(e.key){case 'ArrowUp':moveMaze(0,-1);e.preventDefault();break;case 'ArrowDown':moveMaze(0,1);e.preventDefault();break;case 'ArrowLeft':moveMaze(1,0);e.preventDefault();break;case 'ArrowRight':moveMaze(-1,0);e.preventDefault();break}
  };
  // Touch swipe support
  var tsx,tsy;
  b.ontouchstart=function(e){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY};
  b.ontouchend=function(e){
    var dx=e.changedTouches[0].clientX-tsx;
    var dy=e.changedTouches[0].clientY-tsy;
    if(Math.abs(dx)>Math.abs(dy)){moveMaze(dx>0?-1:1,0)}else{moveMaze(0,dy>0?1:-1)}
  };
}
function generateMaze(size){
  var grid=[];for(var y=0;y<size;y++){grid[y]=[];for(var x=0;x<size;x++)grid[y][x]=1}
  function carve(x,y){
    grid[y][x]=0;
    var dirs=[[0,-2],[0,2],[-2,0],[2,0]];
    dirs.sort(function(){return Math.random()-0.5});
    for(var d=0;d<dirs.length;d++){
      var nx=x+dirs[d][0],ny=y+dirs[d][1];
      if(nx>=0&&nx<size&&ny>=0&&ny<size&&grid[ny][nx]===1){
        grid[y+dirs[d][1]/2][x+dirs[d][0]/2]=0;carve(nx,ny);
      }
    }
  }
  carve(0,0);
  grid[size-1][size-1]=0;
  if(size>2){grid[size-1][size-2]=0;grid[size-2][size-1]=0}
  return grid;
}
function renderMaze(){
  var board=document.getElementById('mazeBoard');if(!board)return;board.innerHTML='';
  board.style.width=(mazeSize*36)+'px';
  for(var y=0;y<mazeSize;y++){
    for(var x=0;x<mazeSize;x++){
      var cell=document.createElement('div');cell.className='maze-cell';
      if(x===mazePlayer.x&&y===mazePlayer.y){cell.classList.add('player');cell.textContent='🧑‍🚀'}
      else if(x===mazeGoal.x&&y===mazeGoal.y){cell.classList.add('goal');cell.textContent='🌟'}
      else if(mazeGrid[y][x]===1)cell.classList.add('wall');
      else{cell.classList.add('path');
        var isVisited=false;for(var v=0;v<mazeVisited.length;v++){if(mazeVisited[v][0]===x&&mazeVisited[v][1]===y){isVisited=true;break}}
        if(isVisited)cell.classList.add('visited');
      }
      board.appendChild(cell);
    }
  }
  var el=document.getElementById('mazeSteps');if(el)el.textContent=mazeSteps;
}
function moveMaze(dx,dy){
  var nx=mazePlayer.x+dx,ny=mazePlayer.y+dy;
  if(nx<0||nx>=mazeSize||ny<0||ny>=mazeSize)return;
  if(mazeGrid[ny][nx]===1)return;
  playClick();mazePlayer.x=nx;mazePlayer.y=ny;mazeSteps++;
  mazeVisited.push([nx,ny]);
  renderMaze();
  if(nx===mazeGoal.x&&ny===mazeGoal.y){
    updateScore(Math.max(5,(50-mazeSteps))*2);
    _gt=setTimeout(function(){showWinMessage('وصلت! بطل المتاهة! 🏰 في '+mazeSteps+' خطوة')},300);
  }
}

// ===== 6. PUZZLE (PICTURE) =====
var puzzleTiles,puzzleSize,puzzleMoves,puzzleImage;
var puzzleImages=[
  {name:'🌅 غروب',colors:['#ff6b6b','#ffa502','#ff6348','#ee5a24','#f0932b'],emoji:'🌅'},
  {name:'🌊 محيط',colors:['#0984e3','#74b9ff','#00cec9','#81ecec','#0652DD'],emoji:'🌊'},
  {name:'🌲 غابة',colors:['#00b894','#55efc4','#00b894','#2d3436','#636e72'],emoji:'🌲'},
  {name:'🌸 ربيع',colors:['#fd79a8','#fab1a0','#e17055','#d63031','#ff7675'],emoji:'🌸'},
  {name:'🌌 فضاء',colors:['#2d3436','#636e72','#6c5ce7','#a29bfe','#dfe6e9'],emoji:'🌌'}
];

function initPuzzle(){
  puzzleSize=currentDiff==='easy'?3:currentDiff==='medium'?4:5;
  puzzleMoves=0;puzzleImage=puzzleImages[Math.floor(Math.random()*puzzleImages.length)];
  puzzleTiles=generatePuzzle(puzzleSize);

  var b=document.getElementById('gameBody');
  var total=puzzleSize*puzzleSize-1;
  b.innerHTML=
    '<div class="game-status" id="puzzleStatus">🧩 رتب الصورة ('+puzzleImage.name+')</div>'+
    '<div class="puzzle-preview" id="puzzlePreview" style="background:linear-gradient(135deg,'+puzzleImage.colors.join(',')+')">'+
    '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem">'+puzzleImage.emoji+'</div></div>'+
    '<div class="puzzle-board" id="puzzleBoard" style="grid-template-columns:repeat('+puzzleSize+',1fr);width:'+Math.min(280,puzzleSize*65)+'px"></div>'+
    '<div style="color:var(--text-secondary);font-size:0.8rem;margin-top:8px">الحركات: <span id="puzzleMoves">0</span></div>';
  renderPuzzle();
}
function generatePuzzle(size){
  var tiles=[];for(var i=1;i<size*size;i++)tiles.push(i);tiles.push(0);
  for(var s=0;s<200;s++){
    var ei=tiles.indexOf(0);var row=Math.floor(ei/size);var col=ei%size;
    var neighbors=[];
    if(row>0)neighbors.push(ei-size);if(row<size-1)neighbors.push(ei+size);
    if(col>0)neighbors.push(ei-1);if(col<size-1)neighbors.push(ei+1);
    var sw=neighbors[Math.floor(Math.random()*neighbors.length)];
    var tmp=tiles[ei];tiles[ei]=tiles[sw];tiles[sw]=tmp;
  }
  return tiles;
}
function renderPuzzle(){
  var board=document.getElementById('puzzleBoard');board.innerHTML='';
  var w=Math.min(280,puzzleSize*65);board.style.width=w+'px';
  var tileSize=Math.floor(w/puzzleSize);
  for(var i=0;i<puzzleTiles.length;i++){
    (function(idx){
      var tile=document.createElement('div');
      tile.className='puzzle-tile';
      tile.style.width=tileSize+'px';tile.style.height=tileSize+'px';
      if(puzzleTiles[idx]===0){
        tile.classList.add('empty');
      }else{
        var val=puzzleTiles[idx];
        var row=Math.floor((val-1)/puzzleSize);var col=(val-1)%puzzleSize;
        var c=puzzleImage.colors;
        var ci=(row*puzzleSize+col)%c.length;
        tile.style.background=c[ci];
        tile.innerHTML='<span class="tile-pattern" style="color:white;text-shadow:0 2px 4px rgba(0,0,0,0.3)">'+puzzleImage.emoji+'</span>';
        tile.onclick=function(){movePuzzle(idx)};
      }
      board.appendChild(tile);
    })(i);
  }
}
function movePuzzle(idx){
  var ei=puzzleTiles.indexOf(0);
  var r=Math.floor(idx/puzzleSize),c=idx%puzzleSize;
  var er=Math.floor(ei/puzzleSize),ec=ei%puzzleSize;
  if(Math.abs(r-er)+Math.abs(c-ec)===1){
    playClick();puzzleMoves++;
    var el=document.getElementById('puzzleMoves');if(el)el.textContent=puzzleMoves;
    var tmp=puzzleTiles[idx];puzzleTiles[idx]=puzzleTiles[ei];puzzleTiles[ei]=tmp;
    renderPuzzle();
    var solved=true;
    for(var i=0;i<puzzleTiles.length-1;i++){if(puzzleTiles[i]!==i+1){solved=false;break}}
    if(solved){updateScore(Math.max(5,(80-puzzleMoves))*3);_gt=setTimeout(function(){showWinMessage('أكملت الصورة! 🧩 في '+puzzleMoves+' حركة')},300)}
  }
}

};
